blueprint:
  name: Smart dry-weather mowing
  description: >-
    Calculate mowing sessions from lawn area and mower capacity, then start a
    Home Assistant lawn mower only when weather and optional wetness blockers say
    the grass should be dry enough. Designed for Gardena Mower BLE, but generic
    enough for any lawn_mower entity with a manual duration number.
  domain: automation
  input:
    mower_entity:
      name: Mower
      description: The lawn_mower entity to start and dock.
      selector:
        entity:
          domain: lawn_mower
    manual_duration_number:
      name: Manual mowing duration number
      description: Number entity that controls manual mowing duration in hours.
      selector:
        entity:
          domain: number
    weather_entity:
      name: Weather entity
      description: Weather entity used for current conditions and hourly forecast.
      selector:
        entity:
          domain: weather
    last_rain_helper:
      name: Last rain helper
      description: Input datetime helper used to remember when rain/wetness was last detected.
      selector:
        entity:
          domain: input_datetime
    last_mow_helper:
      name: Last mow helper
      description: Input datetime helper used to remember when the blueprint last started mowing.
      selector:
        entity:
          domain: input_datetime
    current_mow_start_helper:
      name: Current mowing start helper
      description: Input datetime helper used to remember when the current mowing run started.
      selector:
        entity:
          domain: input_datetime
    total_cutting_time_sensor:
      name: Optional total cutting time sensor
      description: >-
        Optional lifetime cutting/blade-time sensor. When provided, run duration
        and early-stop checks use the cutting-time delta instead of wall-clock
        time, which handles mower sessions split by battery charging.
      default: ""
      selector:
        entity:
          domain: sensor
    current_mow_cutting_start_helper:
      name: Optional cutting time start helper
      description: >-
        Optional input_number helper used to remember the total cutting-time
        value at the start of the current smart mowing run. Use this together
        with the total cutting time sensor.
      default: ""
      selector:
        entity:
          domain: input_number
    next_expected_start_helper:
      name: Optional next expected start helper
      description: >-
        Optional input_datetime helper where the blueprint stores the next
        expected smart mowing start based on rain, drying time, time window, and
        mowing gap.
      default: ""
      selector:
        entity:
          domain: input_datetime
    weekly_schedule_helper:
      name: Optional weekly schedule helper
      description: >-
        Optional input_text helper where the blueprint stores an estimated
        compact smart mowing plan for the coming week.
      default: ""
      selector:
        entity:
          domain: input_text
    mowing_history_calendar:
      name: Optional mowing history calendar
      description: >-
        Optional local calendar used to store completed mowing runs. This is the
        recommended way to get a complete weekly report because input_text state
        is limited to 255 characters.
      default: ""
      selector:
        entity:
          domain: calendar
    last_schedule_notification_helper:
      name: Optional last schedule notification helper
      description: >-
        Optional input_text helper used to remember the last schedule summary
        that was sent as a notification. Required for changed-only daily
        schedule notifications.
      default: ""
      selector:
        entity:
          domain: input_text
    weekly_run_log_helper:
      name: Weekly run log helper
      description: >-
        Input text helper used as a compact fallback weekly report. Use the
        optional mowing history calendar for full run history.
      selector:
        entity:
          domain: input_text
    mowing_debt_helper:
      name: Optional mowing debt helper
      description: >-
        Optional input_number helper storing accumulated mowing minutes still
        owed. This lets manual mowing subtract from the smart schedule.
      default: ""
      selector:
        entity:
          domain: input_number
    mowing_debt_updated_helper:
      name: Optional mowing debt updated helper
      description: >-
        Optional input_datetime helper storing when mowing debt was last updated.
        Use together with the mowing debt helper.
      default: ""
      selector:
        entity:
          domain: input_datetime
    wetness_blockers:
      name: Optional wetness blockers
      description: Optional binary sensors or helpers. If any is on, mowing is blocked.
      default: []
      selector:
        entity:
          multiple: true
    manual_watering_buttons:
      name: Optional manual watering button
      description: >-
        Optional input_button helper shown on a dashboard. Press it after manual
        watering/irrigation to mark the lawn as wet and restart the drying time.
      default: []
      selector:
        entity:
          domain: input_button
          multiple: true
    lawn_area_m2:
      name: Lawn area
      description: Lawn area in square meters.
      default: 250
      selector:
        number:
          min: 10
          max: 5000
          step: 10
          unit_of_measurement: m2
          mode: box
    mower_capacity_m2_per_hour:
      name: Mower capacity
      description: Effective square meters the mower can handle per mowing hour.
      default: 60
      selector:
        number:
          min: 5
          max: 500
          step: 5
          unit_of_measurement: m2/h
          mode: box
    weekly_coverage_multiplier:
      name: Weekly coverage multiplier
      description: >-
        Baseline weekly coverage before weather and growth adjustment. Use 1.0
        as the calibrated baseline for your mower/lawn, then let the smart
        growth model adjust it.
      default: 1.0
      selector:
        number:
          min: 0.25
          max: 5
          step: 0.05
          mode: box
    lawn_use_profile:
      name: Lawn type
      description: Adjusts mowing intensity for the kind of lawn you want.
      default: Play lawn
      selector:
        select:
          options:
            - Ornamental fine lawn
            - Play lawn
            - Low-maintenance lawn
            - Eco/meadow lawn
    grass_climate_type:
      name: Grass climate type
      description: Used to estimate growth from temperature and season.
      default: Mixed/cool-season
      selector:
        select:
          options:
            - Cool-season
            - Warm-season
            - Mixed/cool-season
    growth_adjustment_percent:
      name: Growth adjustment
      description: User calibration applied after the weather/season model.
      default: 100
      selector:
        number:
          min: 25
          max: 250
          step: 5
          unit_of_measurement: "%"
          mode: slider
    lawn_exposure:
      name: Lawn exposure
      description: Sunny lawns dry faster; shaded or north-facing lawns dry slower.
      default: Mixed sun/shade
      selector:
        select:
          options:
            - Sunny/open
            - Mixed sun/shade
            - Shaded/north-facing
    min_sessions_per_week:
      name: Minimum sessions per week
      default: 2
      selector:
        number:
          min: 1
          max: 14
          step: 1
          mode: box
    max_sessions_per_week:
      name: Maximum sessions per week
      default: 7
      selector:
        number:
          min: 1
          max: 21
          step: 1
          mode: box
    min_session_minutes:
      name: Minimum session length
      default: 30
      selector:
        number:
          min: 10
          max: 240
          step: 5
          unit_of_measurement: min
          mode: box
    max_session_minutes:
      name: Maximum session length
      default: 180
      selector:
        number:
          min: 30
          max: 720
          step: 15
          unit_of_measurement: min
          mode: box
    minimum_gap_override_hours:
      name: Minimum gap override
      description: Set to 0 to use the calculated spacing from sessions per week.
      default: 0
      selector:
        number:
          min: 0
          max: 168
          step: 1
          unit_of_measurement: h
          mode: box
    excluded_mowing_weekdays:
      name: Excluded mowing weekdays
      description: >-
        Days when the blueprint must not start mowing. The weekly mowing need is
        distributed over the remaining days. The mower may still finish an
        already-started run after midnight or while charging.
      default: []
      selector:
        select:
          multiple: true
          options:
            - Monday
            - Tuesday
            - Wednesday
            - Thursday
            - Friday
            - Saturday
            - Sunday
    allowed_start_time:
      name: Earliest mowing start
      description: Used when the start reference is Fixed time.
      default: "09:00:00"
      selector:
        time:
    allowed_end_time:
      name: Latest mowing start
      description: Used when the end reference is Fixed time.
      default: "18:00:00"
      selector:
        time:
    allowed_start_reference:
      name: Earliest mowing start reference
      description: Choose whether the mowing window starts at a fixed time, sunrise, or sunset.
      default: Fixed time
      selector:
        select:
          options:
            - Fixed time
            - Sunrise
            - Sunset
    allowed_start_sun_offset_minutes:
      name: Earliest mowing start sun offset
      description: Minutes added to the sunrise/sunset start reference. Use negative values to start before it.
      default: 60
      selector:
        number:
          min: -720
          max: 720
          step: 5
          unit_of_measurement: min
          mode: box
    allowed_end_reference:
      name: Latest mowing start reference
      description: Choose whether the mowing window ends at a fixed time, sunrise, or sunset.
      default: Fixed time
      selector:
        select:
          options:
            - Fixed time
            - Sunrise
            - Sunset
    allowed_end_sun_offset_minutes:
      name: Latest mowing start sun offset
      description: Minutes added to the sunrise/sunset end reference. Use negative values to finish before it.
      default: -60
      selector:
        number:
          min: -720
          max: 720
          step: 5
          unit_of_measurement: min
          mode: box
    check_minutes_pattern:
      name: Check interval
      description: "Time pattern minutes field. Examples: /15, /30, 0."
      default: "/30"
      selector:
        select:
          options:
            - "/15"
            - "/30"
            - "0"
    forecast_lookahead_hours:
      name: Rain forecast lookahead
      description: Do not start if meaningful rain is forecast within this many hours.
      default: 3
      selector:
        number:
          min: 1
          max: 24
          step: 1
          unit_of_measurement: h
          mode: box
    rain_report_lookahead_hours:
      name: Rainy-days report lookahead
      description: >-
        How far ahead the daily status message should scan the hourly forecast
        for rainy days. This avoids requiring a separate daily forecast service.
      default: 72
      selector:
        number:
          min: 0
          max: 168
          step: 6
          unit_of_measurement: h
          mode: box
    precipitation_threshold_mm:
      name: Rain amount threshold
      description: Forecast precipitation amount that blocks mowing.
      default: 0.2
      selector:
        number:
          min: 0
          max: 10
          step: 0.1
          unit_of_measurement: mm
          mode: box
    precipitation_probability_threshold:
      name: Rain probability threshold
      description: Forecast precipitation probability that blocks mowing.
      default: 50
      selector:
        number:
          min: 0
          max: 100
          step: 5
          unit_of_measurement: "%"
          mode: slider
    base_dry_hours_after_rain:
      name: Base drying time after rain
      default: 4
      selector:
        number:
          min: 0
          max: 48
          step: 0.5
          unit_of_measurement: h
          mode: box
    morning_dew_drying_minutes:
      name: Morning dew drying time
      description: >-
        Minimum drying time after sunrise before mowing. The blueprint extends
        this automatically when humidity is high, temperature is low, or the
        lawn is shaded.
      default: 120
      selector:
        number:
          min: 0
          max: 480
          step: 15
          unit_of_measurement: min
          mode: box
    dew_humidity_threshold:
      name: Dew humidity threshold
      description: Humidity above this level is treated as likely dew/leaf wetness.
      default: 85
      selector:
        number:
          min: 60
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: slider
    humidity_block_threshold:
      name: Humidity block threshold
      description: Block mowing above this outdoor humidity value.
      default: 92
      selector:
        number:
          min: 50
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: slider
    low_temperature_threshold:
      name: Low temperature threshold
      description: Add extra drying time below this temperature.
      default: 10
      selector:
        number:
          min: -10
          max: 25
          step: 1
          unit_of_measurement: C
          mode: box
    extra_dry_hours_when_cold_or_humid:
      name: Extra drying time when cold or humid
      default: 2
      selector:
        number:
          min: 0
          max: 24
          step: 0.5
          unit_of_measurement: h
          mode: box
    park_when_wet:
      name: Dock mower when rain/wetness is detected
      default: true
      selector:
        boolean:
    persistent_notifications:
      name: Use persistent notifications
      default: true
      selector:
        boolean:
    phone_notify_service:
      name: Optional phone notify service
      description: >-
        Optional notify service such as notify.mobile_app_phone_name. Leave blank
        to only use persistent notifications.
      default: ""
      selector:
        text:
    command_response_delay_minutes:
      name: Command response check delay
      description: Minutes to wait before checking if start or dock commands took effect.
      default: 5
      selector:
        number:
          min: 1
          max: 30
          step: 1
          unit_of_measurement: min
          mode: box
    max_days_without_mowing:
      name: Alert after this many days without mowing
      description: Alert if wet weather has blocked mowing for too long.
      default: 7
      selector:
        number:
          min: 1
          max: 30
          step: 1
          unit_of_measurement: d
          mode: box
    early_stop_threshold_percent:
      name: Early stop threshold
      description: Alert if a mowing run ends before this percentage of planned duration.
      default: 60
      selector:
        number:
          min: 10
          max: 95
          step: 5
          unit_of_measurement: "%"
          mode: slider
    run_completion_grace_hours:
      name: Run completion grace period
      description: >-
        How long to keep a mowing run open while the mower returns to charge or
        pauses before declaring the run incomplete.
      default: 6
      selector:
        number:
          min: 1
          max: 24
          step: 0.5
          unit_of_measurement: h
          mode: box
    blade_usage_time_sensor:
      name: Optional blade usage time sensor
      description: >-
        Optional lifetime blade/cutting usage sensor for blade replacement
        reminders. If blank, the total cutting time sensor is used.
      default: ""
      selector:
        entity:
          domain: sensor
    last_cleaning_helper:
      name: Optional last cleaning helper
      description: Optional input_datetime helper storing when the mower was last cleaned.
      default: ""
      selector:
        entity:
          domain: input_datetime
    last_blade_change_helper:
      name: Optional last blade change helper
      description: Optional input_datetime helper storing when blades were last changed.
      default: ""
      selector:
        entity:
          domain: input_datetime
    blade_time_at_change_helper:
      name: Optional blade time at change helper
      description: >-
        Optional input_number helper storing blade/cutting usage minutes at the
        last blade change.
      default: ""
      selector:
        entity:
          domain: input_number
    cleaning_reset_buttons:
      name: Optional cleaning reset button
      description: >-
        Optional input_button helper shown on a dashboard. Press it after
        cleaning the mower to reset the cleaning reminder.
      default: []
      selector:
        entity:
          domain: input_button
          multiple: true
    blade_change_reset_buttons:
      name: Optional blade-change reset button
      description: >-
        Optional input_button helper shown on a dashboard. Press it after
        changing blades to reset the blade reminder and store current blade
        usage time.
      default: []
      selector:
        entity:
          domain: input_button
          multiple: true
    cleaning_interval_days:
      name: Cleaning reminder interval
      default: 7
      selector:
        number:
          min: 1
          max: 60
          step: 1
          unit_of_measurement: d
          mode: box
    blade_change_interval_weeks:
      name: Blade change reminder interval
      default: 8
      selector:
        number:
          min: 1
          max: 52
          step: 1
          unit_of_measurement: wk
          mode: box
    blade_change_interval_cutting_hours:
      name: Blade change cutting-time interval
      description: Used when blade usage time and blade time at change helpers are configured.
      default: 60
      selector:
        number:
          min: 5
          max: 300
          step: 5
          unit_of_measurement: h
          mode: box
    weekly_report_day:
      name: Weekly report day
      default: Sunday
      selector:
        select:
          options:
            - Monday
            - Tuesday
            - Wednesday
            - Thursday
            - Friday
            - Saturday
            - Sunday
    weekly_report_time:
      name: Weekly report time
      default: "18:00:00"
      selector:
        time:
    daily_schedule_notification_time:
      name: Daily schedule notification time
      description: >-
        Time to check whether the estimated smart mowing schedule changed and
        send a notification if it did. Configure the last schedule notification
        helper to enable changed-only behavior.
      default: "08:00:00"
      selector:
        time:

mode: queued
max_exceeded: silent

trigger:
  - platform: time_pattern
    id: schedule_check
    minutes: !input check_minutes_pattern
  - platform: state
    id: mowing_started
    entity_id: !input mower_entity
    to: mowing
  - platform: state
    id: mowing_finished
    entity_id: !input mower_entity
    from: mowing
  - platform: state
    id: mower_unavailable
    entity_id: !input mower_entity
    to:
      - unavailable
      - unknown
    for:
      minutes: 5
  - platform: time
    id: weekly_report
    at: !input weekly_report_time
  - platform: time
    id: daily_schedule_report
    at: !input daily_schedule_notification_time
  - platform: state
    id: manual_watering
    entity_id: !input manual_watering_buttons
  - platform: state
    id: cleaning_reset
    entity_id: !input cleaning_reset_buttons
  - platform: state
    id: blade_change_reset
    entity_id: !input blade_change_reset_buttons

variables:
  mower_entity: !input mower_entity
  manual_duration_number: !input manual_duration_number
  weather_entity: !input weather_entity
  last_rain_helper: !input last_rain_helper
  last_mow_helper: !input last_mow_helper
  current_mow_start_helper: !input current_mow_start_helper
  total_cutting_time_sensor: !input total_cutting_time_sensor
  current_mow_cutting_start_helper: !input current_mow_cutting_start_helper
  next_expected_start_helper: !input next_expected_start_helper
  weekly_schedule_helper: !input weekly_schedule_helper
  mowing_history_calendar: !input mowing_history_calendar
  last_schedule_notification_helper: !input last_schedule_notification_helper
  weekly_run_log_helper: !input weekly_run_log_helper
  mowing_debt_helper: !input mowing_debt_helper
  mowing_debt_updated_helper: !input mowing_debt_updated_helper
  wetness_blockers: !input wetness_blockers
  manual_watering_buttons: !input manual_watering_buttons
  lawn_area_m2: !input lawn_area_m2
  mower_capacity_m2_per_hour: !input mower_capacity_m2_per_hour
  weekly_coverage_multiplier: !input weekly_coverage_multiplier
  lawn_use_profile: !input lawn_use_profile
  grass_climate_type: !input grass_climate_type
  growth_adjustment_percent: !input growth_adjustment_percent
  lawn_exposure: !input lawn_exposure
  min_sessions_per_week: !input min_sessions_per_week
  max_sessions_per_week: !input max_sessions_per_week
  min_session_minutes: !input min_session_minutes
  max_session_minutes: !input max_session_minutes
  minimum_gap_override_hours: !input minimum_gap_override_hours
  excluded_mowing_weekdays: !input excluded_mowing_weekdays
  allowed_start_time: !input allowed_start_time
  allowed_end_time: !input allowed_end_time
  allowed_start_reference: !input allowed_start_reference
  allowed_start_sun_offset_minutes: !input allowed_start_sun_offset_minutes
  allowed_end_reference: !input allowed_end_reference
  allowed_end_sun_offset_minutes: !input allowed_end_sun_offset_minutes
  forecast_lookahead_hours: !input forecast_lookahead_hours
  rain_report_lookahead_hours: !input rain_report_lookahead_hours
  precipitation_threshold_mm: !input precipitation_threshold_mm
  precipitation_probability_threshold: !input precipitation_probability_threshold
  base_dry_hours_after_rain: !input base_dry_hours_after_rain
  morning_dew_drying_minutes: !input morning_dew_drying_minutes
  dew_humidity_threshold: !input dew_humidity_threshold
  humidity_block_threshold: !input humidity_block_threshold
  low_temperature_threshold: !input low_temperature_threshold
  extra_dry_hours_when_cold_or_humid: !input extra_dry_hours_when_cold_or_humid
  park_when_wet: !input park_when_wet
  persistent_notifications: !input persistent_notifications
  phone_notify_service: !input phone_notify_service
  command_response_delay_minutes: !input command_response_delay_minutes
  max_days_without_mowing: !input max_days_without_mowing
  early_stop_threshold_percent: !input early_stop_threshold_percent
  run_completion_grace_hours: !input run_completion_grace_hours
  blade_usage_time_sensor: !input blade_usage_time_sensor
  last_cleaning_helper: !input last_cleaning_helper
  last_blade_change_helper: !input last_blade_change_helper
  blade_time_at_change_helper: !input blade_time_at_change_helper
  cleaning_reset_buttons: !input cleaning_reset_buttons
  blade_change_reset_buttons: !input blade_change_reset_buttons
  cleaning_interval_days: !input cleaning_interval_days
  blade_change_interval_weeks: !input blade_change_interval_weeks
  blade_change_interval_cutting_hours: !input blade_change_interval_cutting_hours
  weekly_report_day: !input weekly_report_day
  rain_conditions:
    - rainy
    - pouring
    - lightning-rainy
    - snowy-rainy
    - hail
    - snowy
  mower_state: "{{ states(mower_entity) }}"
  weather_condition: "{{ states(weather_entity) }}"
  outdoor_humidity: "{{ state_attr(weather_entity, 'humidity') | float(0) }}"
  outdoor_temperature: "{{ state_attr(weather_entity, 'temperature') | float(99) }}"
  blocker_active: >-
    {% set entities = wetness_blockers if wetness_blockers is iterable and wetness_blockers is not string else [wetness_blockers] %}
    {% set ns = namespace(active=false) %}
    {% for entity in entities %}
      {% if entity and states(entity) in ['on', 'wet', 'true', 'rainy'] %}
        {% set ns.active = true %}
      {% endif %}
    {% endfor %}
    {{ ns.active }}
  rain_or_wet_blocker_active: >-
    {{ weather_condition in rain_conditions
       or blocker_active | bool }}
  current_wet: >-
    {{ rain_or_wet_blocker_active | bool
       or outdoor_humidity | float(0) >= humidity_block_threshold | float(92) }}
  last_rain_age_hours: >-
    {% set ts = as_timestamp(states(last_rain_helper), none) %}
    {% if ts is none %}
      9999
    {% else %}
      {{ ((as_timestamp(now()) - ts) / 3600) | float(0) }}
    {% endif %}
  last_mow_age_hours: >-
    {% set ts = as_timestamp(states(last_mow_helper), none) %}
    {% if ts is none %}
      9999
    {% else %}
      {{ ((as_timestamp(now()) - ts) / 3600) | float(0) }}
    {% endif %}
  dynamic_dry_hours: >-
    {% set extra = extra_dry_hours_when_cold_or_humid | float(0) %}
    {% set hours = base_dry_hours_after_rain | float(0) %}
    {% if outdoor_humidity | float(0) >= 85 %}
      {% set hours = hours + extra %}
    {% endif %}
    {% if outdoor_temperature | float(99) <= low_temperature_threshold | float(10) %}
      {% set hours = hours + extra %}
    {% endif %}
    {{ hours }}
  base_weekly_minutes_needed: >-
    {% set capacity = mower_capacity_m2_per_hour | float(1) %}
    {% if capacity <= 0 %}
      0
    {% else %}
      {{ ((lawn_area_m2 | float(0)) / capacity * (weekly_coverage_multiplier | float(1)) * 60) | round(0, 'ceil') }}
    {% endif %}
  lawn_profile_factor: >-
    {% if lawn_use_profile == 'Ornamental fine lawn' %}
      1.2
    {% elif lawn_use_profile == 'Low-maintenance lawn' %}
      0.75
    {% elif lawn_use_profile == 'Eco/meadow lawn' %}
      0.45
    {% else %}
      1.0
    {% endif %}
  exposure_growth_factor: >-
    {% if lawn_exposure == 'Sunny/open' %}
      1.05
    {% elif lawn_exposure == 'Shaded/north-facing' %}
      0.85
    {% else %}
      1.0
    {% endif %}
  temperature_growth_factor: >-
    {% set temp = outdoor_temperature | float(15) %}
    {% if grass_climate_type == 'Warm-season' %}
      {% if temp < 10 %}0.1
      {% elif temp < 16 %}0.4
      {% elif temp < 22 %}0.8
      {% elif temp <= 32 %}1.0
      {% elif temp <= 36 %}0.65
      {% else %}0.35
      {% endif %}
    {% else %}
      {% if temp < 5 %}0.1
      {% elif temp < 10 %}0.45
      {% elif temp <= 18 %}1.05
      {% elif temp <= 24 %}1.0
      {% elif temp <= 30 %}0.6
      {% else %}0.25
      {% endif %}
    {% endif %}
  season_growth_factor: >-
    {% set month = now().month %}
    {% if grass_climate_type == 'Warm-season' %}
      {% if month in [6, 7, 8] %}1.15
      {% elif month in [5, 9] %}0.9
      {% elif month in [4, 10] %}0.55
      {% else %}0.2
      {% endif %}
    {% else %}
      {% if month in [4, 5, 6, 9, 10] %}1.15
      {% elif month in [7, 8] %}0.85
      {% elif month in [3, 11] %}0.55
      {% else %}0.15
      {% endif %}
    {% endif %}
  moisture_growth_factor: >-
    {% set rain_age = last_rain_age_hours | float(9999) %}
    {% set humidity = outdoor_humidity | float(0) %}
    {% if rain_age <= 72 and outdoor_temperature | float(0) >= 10 %}
      1.2
    {% elif humidity < 35 and rain_age > 168 %}
      0.55
    {% elif humidity >= 65 %}
      1.05
    {% else %}
      1.0
    {% endif %}
  smart_growth_factor: >-
    {% set factor =
      lawn_profile_factor | float(1)
      * exposure_growth_factor | float(1)
      * temperature_growth_factor | float(1)
      * season_growth_factor | float(1)
      * moisture_growth_factor | float(1)
      * (growth_adjustment_percent | float(100) / 100) %}
    {{ [[factor, 0.1] | max, 2.5] | min }}
  weekly_minutes_needed: >-
    {{ (base_weekly_minutes_needed | float(0) * smart_growth_factor | float(1)) | round(0, 'ceil') }}
  excluded_mowing_weekday_count: >-
    {% set excluded = excluded_mowing_weekdays
      if excluded_mowing_weekdays is iterable and excluded_mowing_weekdays is not string
      else [excluded_mowing_weekdays] %}
    {{ excluded | reject('eq', '') | list | count }}
  active_mowing_weekday_count: >-
    {{ [7 - (excluded_mowing_weekday_count | int(0)), 1] | max }}
  calculated_sessions_per_week: >-
    {% set weekly = weekly_minutes_needed | float(0) %}
    {% set max_minutes = max_session_minutes | float(180) %}
    {% set raw_sessions = ((weekly / max_minutes) | round(0, 'ceil')) | int %}
    {% set effective_min_sessions = [min_sessions_per_week | int(1), active_mowing_weekday_count | int(1)] | min %}
    {% set raw_sessions = [raw_sessions, effective_min_sessions] | max %}
    {{ [raw_sessions, max_sessions_per_week | int(7)] | min }}
  calculated_session_minutes: >-
    {% set sessions = calculated_sessions_per_week | int(1) %}
    {% set raw_minutes = ((weekly_minutes_needed | float(0)) / sessions) | round(0, 'ceil') %}
    {% set raw_minutes = [raw_minutes, min_session_minutes | float(30)] | max %}
    {{ [raw_minutes, max_session_minutes | float(180)] | min }}
  daily_mowing_minutes_needed: >-
    {{ (weekly_minutes_needed | float(0) / (active_mowing_weekday_count | int(1))) | round(1) }}
  use_mowing_debt_helper: >-
    {{ mowing_debt_helper | length > 0
       and mowing_debt_updated_helper | length > 0
       and states(mowing_debt_helper) not in ['unknown', 'unavailable', 'none', '']
       and states(mowing_debt_updated_helper) not in ['unknown', 'unavailable', 'none', ''] }}
  stored_mowing_debt_minutes: "{{ states(mowing_debt_helper) | float(0) }}"
  debt_elapsed_hours: >-
    {% set excluded = excluded_mowing_weekdays
      if excluded_mowing_weekdays is iterable and excluded_mowing_weekdays is not string
      else [excluded_mowing_weekdays] %}
    {% set end_ts = as_timestamp(now()) %}
    {% set updated_ts = as_timestamp(states(mowing_debt_updated_helper), none) %}
    {% set lookback_hours = [last_mow_age_hours | float(0), 336] | min %}
    {% set start_ts = updated_ts if use_mowing_debt_helper | bool and updated_ts is not none else end_ts - (lookback_hours * 3600) %}
    {% set today_start = as_timestamp(today_at('00:00:00')) %}
    {% set ns = namespace(hours=0) %}
    {% for offset in range(-14, 1) %}
      {% set day_start = today_start + (offset * 86400) %}
      {% set day_end = day_start + 86400 %}
      {% set label = day_start | timestamp_custom('%A', true) %}
      {% if day_end > start_ts
            and day_start < end_ts
            and excluded | count < 7
            and label not in excluded %}
        {% set segment_start = [start_ts, day_start] | max %}
        {% set segment_end = [end_ts, day_end] | min %}
        {% set ns.hours = ns.hours + ([((segment_end - segment_start) / 3600), 0] | max) %}
      {% endif %}
    {% endfor %}
    {{ ns.hours | round(2) }}
  updated_mowing_debt_minutes: >-
    {% if use_mowing_debt_helper | bool %}
      {% set gained = daily_mowing_minutes_needed | float(0) / 24 * debt_elapsed_hours | float(0) %}
      {{ [stored_mowing_debt_minutes | float(0) + gained, 0] | max | round(1) }}
    {% else %}
      {{ (daily_mowing_minutes_needed | float(0) / 24 * debt_elapsed_hours | float(0)) | round(1) }}
    {% endif %}
  debt_ready_threshold_minutes: >-
    {{ [calculated_session_minutes | float(30) * 0.8, min_session_minutes | float(30)] | max | round(0) }}
  mowing_debt_ready: >-
    {{ updated_mowing_debt_minutes | float(0) >= debt_ready_threshold_minutes | float(30) }}
  planned_session_minutes: >-
    {% set debt = updated_mowing_debt_minutes | float(0) %}
    {% set target = [debt, calculated_session_minutes | float(30)] | max %}
    {% set target = [target, min_session_minutes | float(30)] | max %}
    {{ [target, max_session_minutes | float(180)] | min | round(0) }}
  calculated_session_hours: >-
    {{ (((planned_session_minutes | float(30)) / 60 * 2) | round(0, 'ceil') / 2) | float }}
  calculated_gap_hours: >-
    {% if minimum_gap_override_hours | float(0) > 0 %}
      {{ minimum_gap_override_hours | float(0) }}
    {% else %}
      {{ (168 / (calculated_sessions_per_week | int(1))) | round(1) }}
    {% endif %}
  today_sunrise_ts: >-
    {% set next_rising = as_timestamp(state_attr('sun.sun', 'next_rising'), none) %}
    {% if next_rising is none %}
      {{ as_timestamp(today_at('06:00:00')) }}
    {% elif is_state('sun.sun', 'above_horizon') %}
      {{ next_rising - 86400 }}
    {% else %}
      {{ next_rising }}
    {% endif %}
  today_sunset_ts: >-
    {% set next_setting = as_timestamp(state_attr('sun.sun', 'next_setting'), none) %}
    {% if next_setting is none %}
      {{ as_timestamp(today_at('18:00:00')) }}
    {% else %}
      {{ next_setting }}
    {% endif %}
  exposure_dry_factor: >-
    {% if lawn_exposure == 'Sunny/open' %}
      0.75
    {% elif lawn_exposure == 'Shaded/north-facing' %}
      1.5
    {% else %}
      1.0
    {% endif %}
  dew_drying_factor: >-
    {% set factor = exposure_dry_factor | float(1) %}
    {% if outdoor_humidity | float(0) >= dew_humidity_threshold | float(85) %}
      {% set factor = factor + 0.45 %}
    {% endif %}
    {% if outdoor_temperature | float(99) <= low_temperature_threshold | float(10) %}
      {% set factor = factor + 0.35 %}
    {% endif %}
    {% if weather_condition in ['cloudy', 'fog', 'partlycloudy'] %}
      {% set factor = factor + 0.25 %}
    {% endif %}
    {{ [[factor, 0.5] | max, 2.5] | min }}
  dew_dry_ts: >-
    {{ today_sunrise_ts | float(0) + morning_dew_drying_minutes | float(120) * dew_drying_factor | float(1) * 60 }}
  dew_active: >-
    {% set now_ts = as_timestamp(now()) %}
    {{ now_ts < dew_dry_ts | float(0)
       or (now_ts >= today_sunset_ts | float(0)
           and outdoor_humidity | float(0) >= dew_humidity_threshold | float(85)) }}
  allowed_start_ts: >-
    {% if allowed_start_reference == 'Sunrise' %}
      {{ today_sunrise_ts | float(0) + allowed_start_sun_offset_minutes | float(0) * 60 }}
    {% elif allowed_start_reference == 'Sunset' %}
      {{ today_sunset_ts | float(0) + allowed_start_sun_offset_minutes | float(0) * 60 }}
    {% else %}
      {{ as_timestamp(today_at(allowed_start_time)) }}
    {% endif %}
  allowed_end_ts: >-
    {% if allowed_end_reference == 'Sunrise' %}
      {{ today_sunrise_ts | float(0) + allowed_end_sun_offset_minutes | float(0) * 60 }}
    {% elif allowed_end_reference == 'Sunset' %}
      {{ today_sunset_ts | float(0) + allowed_end_sun_offset_minutes | float(0) * 60 }}
    {% else %}
      {{ as_timestamp(today_at(allowed_end_time)) }}
    {% endif %}
  within_allowed_time: >-
    {% set start = allowed_start_ts | float(0) %}
    {% set end = allowed_end_ts | float(0) %}
    {% set now_ts = as_timestamp(now()) %}
    {% if start <= end %}
      {{ start <= now_ts <= end }}
    {% else %}
      {{ now_ts >= start or now_ts <= end }}
    {% endif %}
  allowed_weekday_today: >-
    {% set excluded = excluded_mowing_weekdays
      if excluded_mowing_weekdays is iterable and excluded_mowing_weekdays is not string
      else [excluded_mowing_weekdays] %}
    {{ excluded | count < 7 and now().strftime('%A') not in excluded }}
  use_cutting_time_sensor: >-
    {{ total_cutting_time_sensor | length > 0
       and current_mow_cutting_start_helper | length > 0
       and states(total_cutting_time_sensor) not in ['unknown', 'unavailable', 'none', '']
       and states(current_mow_cutting_start_helper) not in ['unknown', 'unavailable', 'none', ''] }}
  current_cutting_minutes: >-
    {% set value = states(total_cutting_time_sensor) | float(0) %}
    {% set unit = state_attr(total_cutting_time_sensor, 'unit_of_measurement') | default('', true) %}
    {% if unit in ['s', 'sec', 'second', 'seconds'] %}
      {{ value / 60 }}
    {% elif unit in ['h', 'hr', 'hour', 'hours'] %}
      {{ value * 60 }}
    {% elif unit in ['d', 'day', 'days'] %}
      {{ value * 1440 }}
    {% else %}
      {{ value }}
    {% endif %}
  stored_cutting_start_minutes: "{{ states(current_mow_cutting_start_helper) | float(0) }}"
  active_cutting_minutes: >-
    {{ [current_cutting_minutes | float(0) - stored_cutting_start_minutes | float(0), 0] | max }}
  current_run_started_ts: "{{ as_timestamp(states(current_mow_start_helper), none) }}"
  current_run_elapsed_hours: >-
    {% if current_run_started_ts is none %}
      0
    {% else %}
      {{ [((as_timestamp(now()) - current_run_started_ts) / 3600), 0] | max }}
    {% endif %}
  current_run_open: >-
    {{ current_run_started_ts is not none
       and use_cutting_time_sensor | bool
       and stored_cutting_start_minutes | float(0) > 0 }}
  current_run_stale: >-
    {{ current_run_open | bool
       and current_run_elapsed_hours | float(0) >= run_completion_grace_hours | float(6)
       and mower_state not in ['mowing', 'returning'] }}
  blade_usage_entity: >-
    {{ blade_usage_time_sensor if blade_usage_time_sensor | length > 0 else total_cutting_time_sensor }}
  use_blade_usage_sensor: >-
    {{ blade_usage_entity | length > 0
       and states(blade_usage_entity) not in ['unknown', 'unavailable', 'none', ''] }}
  blade_usage_minutes: >-
    {% set value = states(blade_usage_entity) | float(0) %}
    {% set unit = state_attr(blade_usage_entity, 'unit_of_measurement') | default('', true) %}
    {% if unit in ['s', 'sec', 'second', 'seconds'] %}
      {{ value / 60 }}
    {% elif unit in ['h', 'hr', 'hour', 'hours'] %}
      {{ value * 60 }}
    {% elif unit in ['d', 'day', 'days'] %}
      {{ value * 1440 }}
    {% else %}
      {{ value }}
    {% endif %}
  last_cleaning_age_days: >-
    {% set ts = as_timestamp(states(last_cleaning_helper), none) %}
    {% if last_cleaning_helper | length == 0 or ts is none %}
      0
    {% else %}
      {{ ((as_timestamp(now()) - ts) / 86400) | round(1) }}
    {% endif %}
  cleaning_due: >-
    {{ last_cleaning_helper | length > 0
       and last_cleaning_age_days | float(0) >= cleaning_interval_days | float(7) }}
  last_blade_change_age_weeks: >-
    {% set ts = as_timestamp(states(last_blade_change_helper), none) %}
    {% if last_blade_change_helper | length == 0 or ts is none %}
      0
    {% else %}
      {{ ((as_timestamp(now()) - ts) / 604800) | round(1) }}
    {% endif %}
  blade_hours_since_change: >-
    {% if use_blade_usage_sensor | bool and blade_time_at_change_helper | length > 0 %}
      {{ [((blade_usage_minutes | float(0) - states(blade_time_at_change_helper) | float(0)) / 60), 0] | max | round(1) }}
    {% else %}
      0
    {% endif %}
  blade_change_due: >-
    {{ (last_blade_change_helper | length > 0
        and last_blade_change_age_weeks | float(0) >= blade_change_interval_weeks | float(8))
       or (use_blade_usage_sensor | bool
           and blade_time_at_change_helper | length > 0
           and blade_hours_since_change | float(0) >= blade_change_interval_cutting_hours | float(60)) }}

action:
  - choose:
      - conditions: "{{ trigger.id == 'manual_watering' }}"
        sequence:
          - action: input_datetime.set_datetime
            target:
              entity_id: !input last_rain_helper
            data:
              datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
          - choose:
              - conditions: "{{ persistent_notifications | bool }}"
                sequence:
                  - action: persistent_notification.create
                    data:
                      title: Smart mowing
                      message: >-
                        Manual watering recorded. Mowing will wait for the
                        configured drying time.
                      notification_id: smart_mowing_manual_watering
          - choose:
              - conditions: >-
                  {{ phone_notify_service | length > 0 }}
                sequence:
                  - action: "{{ phone_notify_service }}"
                    data:
                      title: Smart mowing
                      message: "Manual watering recorded; mowing will wait for the drying time."
          - choose:
              - conditions: "{{ park_when_wet | bool and mower_state == 'mowing' }}"
                sequence:
                  - action: lawn_mower.dock
                    target:
                      entity_id: !input mower_entity
          - stop: Manual watering recorded.

      - conditions: "{{ trigger.id == 'cleaning_reset' }}"
        sequence:
          - choose:
              - conditions: "{{ last_cleaning_helper | length > 0 }}"
                sequence:
                  - action: input_datetime.set_datetime
                    data:
                      entity_id: "{{ last_cleaning_helper }}"
                      datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
          - choose:
              - conditions: "{{ persistent_notifications | bool }}"
                sequence:
                  - action: persistent_notification.create
                    data:
                      title: Smart mowing maintenance
                      message: "Mower cleaning reminder reset."
                      notification_id: smart_mowing_cleaning_reset
          - stop: Cleaning maintenance reset recorded.

      - conditions: "{{ trigger.id == 'blade_change_reset' }}"
        sequence:
          - choose:
              - conditions: "{{ last_blade_change_helper | length > 0 }}"
                sequence:
                  - action: input_datetime.set_datetime
                    data:
                      entity_id: "{{ last_blade_change_helper }}"
                      datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
          - choose:
              - conditions: >-
                  {{ use_blade_usage_sensor | bool
                     and blade_time_at_change_helper | length > 0 }}
                sequence:
                  - action: input_number.set_value
                    data:
                      entity_id: "{{ blade_time_at_change_helper }}"
                      value: "{{ blade_usage_minutes | float(0) }}"
          - choose:
              - conditions: "{{ persistent_notifications | bool }}"
                sequence:
                  - action: persistent_notification.create
                    data:
                      title: Smart mowing maintenance
                      message: "Blade change reminder reset."
                      notification_id: smart_mowing_blade_change_reset
          - stop: Blade maintenance reset recorded.

      - conditions: "{{ trigger.id == 'mower_unavailable' }}"
        sequence:
          - choose:
              - conditions: "{{ persistent_notifications | bool }}"
                sequence:
                  - action: persistent_notification.create
                    data:
                      title: Smart mowing alert
                      message: "Mower is unavailable or not responding: {{ mower_entity }}"
                      notification_id: smart_mowing_mower_unavailable
          - choose:
              - conditions: "{{ phone_notify_service | length > 0 }}"
                sequence:
                  - action: "{{ phone_notify_service }}"
                    data:
                      title: Smart mowing alert
                      message: "Mower is unavailable or not responding: {{ mower_entity }}"
          - stop: Mower unavailable alert sent.

      - conditions: "{{ trigger.id == 'mowing_started' }}"
        sequence:
          - variables:
              planned_minutes: "{{ (states(manual_duration_number) | float(calculated_session_hours | float(0)) * 60) | round(0) }}"
              cutting_start_should_reset: >-
                {{ not use_cutting_time_sensor | bool
                   or stored_cutting_start_minutes | float(0) <= 0
                   or active_cutting_minutes | float(0) >= planned_minutes | float(0) * (early_stop_threshold_percent | float(60) / 100) }}
          - choose:
              - conditions: "{{ cutting_start_should_reset | bool }}"
                sequence:
                  - action: input_datetime.set_datetime
                    target:
                      entity_id: !input current_mow_start_helper
                    data:
                      datetime: >-
                        {{ as_local(trigger.to_state.last_changed).strftime('%Y-%m-%d %H:%M:%S')
                           if trigger.to_state is defined and trigger.to_state is not none
                           else now().strftime('%Y-%m-%d %H:%M:%S') }}
                  - choose:
                      - conditions: "{{ use_cutting_time_sensor | bool }}"
                        sequence:
                          - action: input_number.set_value
                            data:
                              entity_id: "{{ current_mow_cutting_start_helper }}"
                              value: "{{ current_cutting_minutes | float(0) }}"
          - stop: Mowing start recorded.

      - conditions: "{{ trigger.id == 'mowing_finished' }}"
        sequence:
          - variables:
              started_ts: "{{ as_timestamp(states(current_mow_start_helper), none) }}"
              ended_ts: "{{ as_timestamp(now()) }}"
              wall_duration_minutes: >-
                {% if started_ts is none %}
                  0
                {% else %}
                  {{ ((ended_ts - started_ts) / 60) | round(0) }}
                {% endif %}
              planned_minutes: "{{ (states(manual_duration_number) | float(calculated_session_hours | float(0)) * 60) | round(0) }}"
              cutting_duration_minutes: "{{ active_cutting_minutes | float(0) | round(0) }}"
              duration_minutes: >-
                {% if use_cutting_time_sensor | bool %}
                  {{ cutting_duration_minutes }}
                {% else %}
                  {{ wall_duration_minutes }}
                {% endif %}
              needs_more_cutting: >-
                {{ duration_minutes | float(0) > 0
                   and planned_minutes | float(0) > 0
                   and duration_minutes | float(0) < planned_minutes | float(0) * (early_stop_threshold_percent | float(60) / 100) }}
              likely_recharge_pause: >-
                {{ use_cutting_time_sensor | bool
                   and needs_more_cutting | bool
                   and current_run_elapsed_hours | float(0) < run_completion_grace_hours | float(6)
                   and states(mower_entity) in ['returning', 'docked', 'paused', 'idle'] }}
              too_short: >-
                {{ needs_more_cutting | bool and not likely_recharge_pause | bool }}
              run_line: >-
                {{ now().strftime('%a') }}
                {{ started_ts | timestamp_custom('%H:%M', true) if started_ts is not none else 'unknown' }}
                - {{ now().strftime('%H:%M') }}
                {{ duration_minutes | int(0) }}m{% if too_short | bool %} early{% endif %}
              existing_log: "{{ states(weekly_run_log_helper) }}"
              new_log: >-
                {% set existing = '' if existing_log in ['unknown', 'unavailable', 'none'] else existing_log %}
                {{ (existing ~ '\n' ~ run_line).strip() }}
              wet_finish_cleanup_recommended: >-
                {{ current_wet | bool
                   or outdoor_humidity | float(0) >= dew_humidity_threshold | float(85)
                   or last_rain_age_hours | float(9999) <= dynamic_dry_hours | float(4) + 1 }}
              debt_after_run_minutes: >-
                {{ [updated_mowing_debt_minutes | float(0) - duration_minutes | float(0), 0] | max | round(1) }}
          - choose:
              - conditions: "{{ likely_recharge_pause | bool }}"
                sequence:
                  - stop: Mower paused or docked before enough cutting time was reached; treating this as a recharge/interruption, not a completed run.
          - action: input_text.set_value
            data:
              entity_id: "{{ weekly_run_log_helper }}"
              value: "{{ new_log[-240:] }}"
          - choose:
              - conditions: "{{ mowing_history_calendar | length > 0 }}"
                sequence:
                  - action: calendar.create_event
                    target:
                      entity_id: "{{ mowing_history_calendar }}"
                    data:
                      summary: >-
                        Mowing {{ duration_minutes | int(0) }} min{% if too_short | bool %} early{% endif %}
                      start_date_time: >-
                        {{ started_ts | timestamp_custom('%Y-%m-%d %H:%M:%S', true) if started_ts is not none else (now() - timedelta(minutes=duration_minutes | int(0))).strftime('%Y-%m-%d %H:%M:%S') }}
                      end_date_time: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                      description: >-
                        Cutting minutes: {{ duration_minutes | int(0) }};
                        planned: {{ planned_minutes | int(0) }};
                        source: {{ 'cutting time sensor' if use_cutting_time_sensor | bool else 'wall clock' }}.
          - choose:
              - conditions: "{{ use_mowing_debt_helper | bool }}"
                sequence:
                  - action: input_number.set_value
                    data:
                      entity_id: "{{ mowing_debt_helper }}"
                      value: "{{ debt_after_run_minutes }}"
                  - action: input_datetime.set_datetime
                    data:
                      entity_id: "{{ mowing_debt_updated_helper }}"
                      datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
          - action: input_datetime.set_datetime
            target:
              entity_id: !input last_mow_helper
            data:
              datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
          - choose:
              - conditions: "{{ use_cutting_time_sensor | bool }}"
                sequence:
                  - action: input_number.set_value
                    data:
                      entity_id: "{{ current_mow_cutting_start_helper }}"
                      value: 0
          - choose:
              - conditions: "{{ wet_finish_cleanup_recommended | bool }}"
                sequence:
                  - choose:
                      - conditions: "{{ persistent_notifications | bool }}"
                        sequence:
                          - action: persistent_notification.create
                            data:
                              title: Smart mowing maintenance
                              message: >-
                                Mower ran while grass may have been wet or humid.
                                Check and clean the underside/blades.
                              notification_id: smart_mowing_clean_after_wet_run
                  - choose:
                      - conditions: "{{ phone_notify_service | length > 0 }}"
                        sequence:
                          - action: "{{ phone_notify_service }}"
                            data:
                              title: Smart mowing maintenance
                              message: "Mower ran in wet/humid conditions. Check and clean it."
          - choose:
              - conditions: "{{ too_short | bool }}"
                sequence:
                  - choose:
                      - conditions: "{{ persistent_notifications | bool }}"
                        sequence:
                          - action: persistent_notification.create
                            data:
                              title: Smart mowing alert
                              message: >-
                                Mowing ended early. Planned about {{ planned_minutes | int(0) }}
                                min, but ran {{ duration_minutes | int(0) }} min.
                              notification_id: smart_mowing_ended_early
                  - choose:
                      - conditions: "{{ phone_notify_service | length > 0 }}"
                        sequence:
                          - action: "{{ phone_notify_service }}"
                            data:
                              title: Smart mowing alert
                              message: >-
                                Mowing ended early. Planned about {{ planned_minutes | int(0) }}
                                min, but ran {{ duration_minutes | int(0) }} min.
          - stop: Mowing finish recorded.

      - conditions: "{{ trigger.id == 'weekly_report' }}"
        sequence:
          - condition: template
            value_template: "{{ now().strftime('%A') == weekly_report_day }}"
          - choose:
              - conditions: "{{ mowing_history_calendar | length > 0 }}"
                sequence:
                  - action: calendar.get_events
                    target:
                      entity_id: "{{ mowing_history_calendar }}"
                    data:
                      start_date_time: "{{ (now() - timedelta(days=7)).strftime('%Y-%m-%d %H:%M:%S') }}"
                      end_date_time: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                    response_variable: mowing_week_events
          - variables:
              report_text: >-
                {% if mowing_history_calendar | length > 0 %}
                  {% set events = mowing_week_events[mowing_history_calendar]['events']
                    if mowing_week_events is defined and mowing_history_calendar in mowing_week_events else [] %}
                  {% if events | count == 0 %}
                    No mowing runs were recorded this week.
                  {% else %}
                    {% set ns = namespace(lines=[], total=0) %}
                    {% for event in events %}
                      {% set start_ts = as_timestamp(event.start, none) %}
                      {% set end_ts = as_timestamp(event.end, none) %}
                      {% set wall_minutes = ((end_ts - start_ts) / 60) | round(0) if start_ts is not none and end_ts is not none else 0 %}
                      {% set description = event.description | default('', true) %}
                      {% set cutting_text = description.split('Cutting minutes: ')[1].split(';')[0]
                        if 'Cutting minutes: ' in description else '' %}
                      {% set minutes = cutting_text | int(wall_minutes | int(0)) %}
                      {% set ns.total = ns.total + minutes %}
                      {% set ns.lines = ns.lines + [
                        (start_ts | timestamp_custom('%a %H:%M', true) if start_ts is not none else 'unknown')
                        ~ '-' ~
                        (end_ts | timestamp_custom('%H:%M', true) if end_ts is not none else 'unknown')
                        ~ ' ' ~ (minutes | int(0)) ~ 'm'
                      ] %}
                    {% endfor %}
                    {{ events | count }} runs, {{ ns.total | int(0) }} min cutting time:
                    {{ ns.lines | join('; ') }}
                  {% endif %}
                {% else %}
                  {% set log = states(weekly_run_log_helper) %}
                  {% if log in ['unknown', 'unavailable', 'none', ''] %}
                    No mowing runs were recorded this week.
                  {% else %}
                    {{ log }}
                  {% endif %}
                {% endif %}
          - choose:
              - conditions: "{{ persistent_notifications | bool }}"
                sequence:
                  - action: persistent_notification.create
                    data:
                      title: Smart mowing weekly report
                      message: "{{ report_text }}"
                      notification_id: smart_mowing_weekly_report
          - choose:
              - conditions: "{{ phone_notify_service | length > 0 }}"
                sequence:
                  - action: "{{ phone_notify_service }}"
                    data:
                      title: Smart mowing weekly report
                      message: "{{ report_text }}"
          - action: input_text.set_value
            data:
              entity_id: "{{ weekly_run_log_helper }}"
              value: ""
          - stop: Weekly report sent.

  - action: weather.get_forecasts
    target:
      entity_id: !input weather_entity
    data:
      type: hourly
    response_variable: weather_forecast

  - variables:
      hourly_forecast: "{{ weather_forecast[weather_entity]['forecast'] if weather_entity in weather_forecast else [] }}"
      rain_forecast_soon: >-
        {% set ns = namespace(rain=false) %}
        {% for item in hourly_forecast[: (forecast_lookahead_hours | float(3) | round(0, 'ceil') | int)] %}
          {% set condition = item.condition | default('') %}
          {% set precipitation = item.precipitation | default(0) | float(0) %}
          {% set probability = item.precipitation_probability | default(0) | float(0) %}
          {% if condition in rain_conditions
                or precipitation >= precipitation_threshold_mm | float(0.2)
                or probability >= precipitation_probability_threshold | float(50) %}
            {% set ns.rain = true %}
          {% endif %}
        {% endfor %}
        {{ ns.rain }}
      safe_to_mow: >-
        {{ within_allowed_time | bool
           and allowed_weekday_today | bool
           and not current_wet | bool
           and not dew_active | bool
           and not rain_forecast_soon | bool
           and last_rain_age_hours | float(9999) >= dynamic_dry_hours | float(4)
           and (minimum_gap_override_hours | float(0) <= 0
                or last_mow_age_hours | float(9999) >= calculated_gap_hours | float(24))
           and mowing_debt_ready | bool
           and not current_run_open | bool
           and mower_state not in ['mowing', 'returning', 'error', 'unavailable', 'unknown'] }}
      next_expected_start: >-
        {% set now_ts = as_timestamp(now()) %}
        {% set day_start = as_timestamp(today_at('00:00:00')) %}
        {% set base_start = allowed_start_ts | float(0) %}
        {% set base_end = allowed_end_ts | float(0) %}
        {% set rain_ts = as_timestamp(states(last_rain_helper), none) %}
        {% set dry_ts = 0 if rain_ts is none else rain_ts + (dynamic_dry_hours | float(4) * 3600) %}
        {% set mow_ts = as_timestamp(states(last_mow_helper), none) %}
        {% set gap_ts = 0 if mow_ts is none or minimum_gap_override_hours | float(0) <= 0 else mow_ts + (calculated_gap_hours | float(24) * 3600) %}
        {% set forecast_ts = now_ts + (forecast_lookahead_hours | float(3) * 3600) if rain_forecast_soon | bool else 0 %}
        {% set wet_ts = now_ts + (dynamic_dry_hours | float(4) * 3600) if current_wet | bool else 0 %}
        {% set dew_ts = dew_dry_ts | float(0) if dew_active | bool else 0 %}
        {% set debt_per_hour = daily_mowing_minutes_needed | float(0) / 24 %}
        {% set debt_missing = debt_ready_threshold_minutes | float(0) - updated_mowing_debt_minutes | float(0) %}
        {% set debt_ts = now_ts + (debt_missing / debt_per_hour * 3600) if debt_missing > 0 and debt_per_hour > 0 else 0 %}
        {% set target_ts = [now_ts, dry_ts, gap_ts, forecast_ts, wet_ts, dew_ts, debt_ts] | max %}
        {% set day_offset = (((target_ts - day_start) // 86400) | int) * 86400 %}
        {% set start = base_start + day_offset %}
        {% set end = base_end + day_offset %}
        {% if start <= end %}
          {% if target_ts <= start %}
            {% set window_ts = start %}
          {% elif target_ts <= end %}
            {% set window_ts = target_ts %}
          {% else %}
            {% set window_ts = start + 86400 %}
          {% endif %}
        {% else %}
          {% if target_ts >= start or target_ts <= end %}
            {% set window_ts = target_ts %}
          {% else %}
            {% set window_ts = start %}
          {% endif %}
        {% endif %}
        {% set excluded = excluded_mowing_weekdays
          if excluded_mowing_weekdays is iterable and excluded_mowing_weekdays is not string
          else [excluded_mowing_weekdays] %}
        {% set base_day_offset = (((window_ts - day_start) // 86400) | int) * 86400 %}
        {% set ns = namespace(selected_ts=window_ts, found=false) %}
        {% for offset in range(0, 8) %}
          {% set candidate = window_ts if offset == 0 else base_start + base_day_offset + (offset * 86400) %}
          {% set label = candidate | timestamp_custom('%A', true) %}
          {% if not ns.found and excluded | count < 7 and label not in excluded %}
            {% set ns.selected_ts = candidate %}
            {% set ns.found = true %}
          {% endif %}
        {% endfor %}
        {{ ns.selected_ts | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}
      estimated_weekly_schedule: >-
        {% set start_ts = as_timestamp(next_expected_start, none) %}
        {% set sessions = calculated_sessions_per_week | int(1) %}
        {% set gap = calculated_gap_hours | float(24) * 3600 %}
        {% set duration = planned_session_minutes | int(0) %}
        {% set day_start = as_timestamp(today_at('00:00:00')) %}
        {% set base_start = allowed_start_ts | float(0) %}
        {% set base_end = allowed_end_ts | float(0) %}
        {% if excluded_mowing_weekday_count | int(0) >= 7 %}
          No mowing weekdays available
        {% elif start_ts is none %}
          No schedule estimate
        {% else %}
          {% set shown = [sessions, 7] | min %}
          {% set search_count = [[sessions * 3, shown] | max, 21] | min %}
          {% set ns = namespace(times=[], keys=[]) %}
          {% for index in range(search_count) %}
            {% set raw_ts = start_ts + (index * gap) %}
            {% set day_offset = (((raw_ts - day_start) // 86400) | int) * 86400 %}
            {% set start = base_start + day_offset %}
            {% set end = base_end + day_offset %}
            {% if start <= end %}
              {% if raw_ts <= start %}
                {% set ts = start %}
              {% elif raw_ts <= end %}
                {% set ts = raw_ts %}
              {% else %}
                {% set ts = start + 86400 %}
              {% endif %}
            {% else %}
              {% if raw_ts >= start or raw_ts <= end %}
                {% set ts = raw_ts %}
              {% else %}
                {% set ts = start %}
              {% endif %}
            {% endif %}
            {% set excluded = excluded_mowing_weekdays
              if excluded_mowing_weekdays is iterable and excluded_mowing_weekdays is not string
              else [excluded_mowing_weekdays] %}
            {% set adjusted = namespace(ts=ts, found=false) %}
            {% set base_day_offset = (((ts - day_start) // 86400) | int) * 86400 %}
            {% for offset in range(0, 8) %}
              {% set candidate = ts if offset == 0 else base_start + base_day_offset + (offset * 86400) %}
              {% set label = candidate | timestamp_custom('%A', true) %}
              {% if not adjusted.found and excluded | count < 7 and label not in excluded %}
                {% set adjusted.ts = candidate %}
                {% set adjusted.found = true %}
              {% endif %}
            {% endfor %}
            {% set key = adjusted.ts | timestamp_custom('%Y-%m-%d %H:%M', true) %}
            {% if ns.times | count < shown and key not in ns.keys %}
              {% set ns.keys = ns.keys + [key] %}
              {% set ns.times = ns.times + [adjusted.ts | timestamp_custom('%a %H:%M', true)] %}
            {% endif %}
          {% endfor %}
          Next {{ start_ts | timestamp_custom('%a %H:%M', true) }},
          {{ duration }}m; debt {{ updated_mowing_debt_minutes | int(0) }}m,
          growth x{{ smart_growth_factor | float(1) | round(2) }};
          {{ ns.times | join(', ') }}{% if sessions > (ns.times | count) %}, +{{ sessions - (ns.times | count) }} more{% endif %}
        {% endif %}

  - choose:
      - conditions: "{{ use_mowing_debt_helper | bool }}"
        sequence:
          - action: input_number.set_value
            data:
              entity_id: "{{ mowing_debt_helper }}"
              value: "{{ updated_mowing_debt_minutes }}"
          - action: input_datetime.set_datetime
            data:
              entity_id: "{{ mowing_debt_updated_helper }}"
              datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

  - choose:
      - conditions: "{{ current_run_stale | bool }}"
        sequence:
          - variables:
              started_ts: "{{ as_timestamp(states(current_mow_start_helper), none) }}"
              planned_minutes: "{{ (states(manual_duration_number) | float(calculated_session_hours | float(0)) * 60) | round(0) }}"
              duration_minutes: >-
                {% if use_cutting_time_sensor | bool %}
                  {{ active_cutting_minutes | float(0) | round(0) }}
                {% elif started_ts is none %}
                  0
                {% else %}
                  {{ ((as_timestamp(now()) - started_ts) / 60) | round(0) }}
                {% endif %}
              debt_after_run_minutes: >-
                {{ [updated_mowing_debt_minutes | float(0) - duration_minutes | float(0), 0] | max | round(1) }}
              run_line: >-
                {{ now().strftime('%a') }}
                {{ started_ts | timestamp_custom('%H:%M', true) if started_ts is not none else 'unknown' }}
                - {{ now().strftime('%H:%M') }}
                {{ duration_minutes | int(0) }}m incomplete
              existing_log: "{{ states(weekly_run_log_helper) }}"
              new_log: >-
                {% set existing = '' if existing_log in ['unknown', 'unavailable', 'none'] else existing_log %}
                {{ (existing ~ '\n' ~ run_line).strip() }}
          - action: input_text.set_value
            data:
              entity_id: "{{ weekly_run_log_helper }}"
              value: "{{ new_log[-240:] }}"
          - choose:
              - conditions: "{{ mowing_history_calendar | length > 0 }}"
                sequence:
                  - action: calendar.create_event
                    target:
                      entity_id: "{{ mowing_history_calendar }}"
                    data:
                      summary: "Mowing {{ duration_minutes | int(0) }} min incomplete"
                      start_date_time: >-
                        {{ started_ts | timestamp_custom('%Y-%m-%d %H:%M:%S', true) if started_ts is not none else (now() - timedelta(minutes=duration_minutes | int(0))).strftime('%Y-%m-%d %H:%M:%S') }}
                      end_date_time: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                      description: >-
                        Cutting minutes: {{ duration_minutes | int(0) }};
                        planned: {{ planned_minutes | int(0) }};
                        source: {{ 'cutting time sensor' if use_cutting_time_sensor | bool else 'wall clock' }};
                        status: incomplete.
                        Run did not resume or complete within
                        {{ run_completion_grace_hours | float(6) }} hours.
          - choose:
              - conditions: "{{ use_mowing_debt_helper | bool }}"
                sequence:
                  - action: input_number.set_value
                    data:
                      entity_id: "{{ mowing_debt_helper }}"
                      value: "{{ debt_after_run_minutes }}"
                  - action: input_datetime.set_datetime
                    data:
                      entity_id: "{{ mowing_debt_updated_helper }}"
                      datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
          - action: input_datetime.set_datetime
            target:
              entity_id: !input last_mow_helper
            data:
              datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
          - choose:
              - conditions: "{{ use_cutting_time_sensor | bool }}"
                sequence:
                  - action: input_number.set_value
                    data:
                      entity_id: "{{ current_mow_cutting_start_helper }}"
                      value: 0
          - choose:
              - conditions: "{{ persistent_notifications | bool }}"
                sequence:
                  - action: persistent_notification.create
                    data:
                      title: Smart mowing alert
                      message: >-
                        Mowing did not complete within
                        {{ run_completion_grace_hours | float(6) }} hours.
                        Recorded {{ duration_minutes | int(0) }} min and kept
                        the remaining mowing debt for a later dry window.
                      notification_id: smart_mowing_run_incomplete
          - choose:
              - conditions: "{{ phone_notify_service | length > 0 }}"
                sequence:
                  - action: "{{ phone_notify_service }}"
                    data:
                      title: Smart mowing alert
                      message: >-
                        Mowing did not complete. Recorded
                        {{ duration_minutes | int(0) }} min.
          - stop: Stale mowing run finalized.

  - choose:
      - conditions: "{{ next_expected_start_helper | length > 0 }}"
        sequence:
          - action: input_datetime.set_datetime
            data:
              entity_id: "{{ next_expected_start_helper }}"
              datetime: "{{ next_expected_start }}"

  - choose:
      - conditions: "{{ weekly_schedule_helper | length > 0 }}"
        sequence:
          - action: input_text.set_value
            data:
              entity_id: "{{ weekly_schedule_helper }}"
              value: "{{ estimated_weekly_schedule[:255] }}"

  - choose:
      - conditions: "{{ trigger.id == 'daily_schedule_report' }}"
        sequence:
          - variables:
              compact_schedule: "{{ estimated_weekly_schedule[:255] }}"
              rainy_forecast_summary: >-
                {% set now_ts = as_timestamp(now()) %}
                {% set until_ts = now_ts + (rain_report_lookahead_hours | float(72) * 3600) %}
                {% set ns = namespace(days=[]) %}
                {% for item in hourly_forecast %}
                  {% set item_ts = as_timestamp(item.datetime, none) if item.datetime is defined else none %}
                  {% set condition = item.condition | default('') %}
                  {% set precipitation = item.precipitation | default(0) | float(0) %}
                  {% set probability = item.precipitation_probability | default(0) | float(0) %}
                  {% if item_ts is not none
                        and item_ts <= until_ts
                        and (condition in rain_conditions
                        or precipitation >= precipitation_threshold_mm | float(0.2)
                        or probability >= precipitation_probability_threshold | float(50)) %}
                    {% set label = item_ts | timestamp_custom('%a %d/%m', true) %}
                    {% if label not in ns.days %}
                      {% set ns.days = ns.days + [label] %}
                    {% endif %}
                  {% endif %}
                {% endfor %}
                {{ ns.days[:4] | join(', ') }}{% if ns.days | count > 4 %}, +{{ (ns.days | count) - 4 }} more{% endif %}
              block_reasons: >-
                {% set ns = namespace(reasons=[]) %}
                {% if current_wet | bool %}
                  {% set ns.reasons = ns.reasons + ['wet/rain/humidity now'] %}
                {% endif %}
                {% if dew_active | bool %}
                  {% set ns.reasons = ns.reasons + ['dew drying until ' ~ (dew_dry_ts | float(0) | timestamp_custom('%H:%M', true))] %}
                {% endif %}
                {% if rain_forecast_soon | bool %}
                  {% set ns.reasons = ns.reasons + ['rain forecast soon'] %}
                {% endif %}
                {% if not within_allowed_time | bool %}
                  {% set ns.reasons = ns.reasons + ['outside mowing window'] %}
                {% endif %}
                {% if excluded_mowing_weekday_count | int(0) >= 7 %}
                  {% set ns.reasons = ns.reasons + ['all weekdays excluded'] %}
                {% elif not allowed_weekday_today | bool %}
                  {% set ns.reasons = ns.reasons + ['weekday excluded'] %}
                {% endif %}
                {% if not mowing_debt_ready | bool %}
                  {% set ns.reasons = ns.reasons + ['mowing need ' ~ (updated_mowing_debt_minutes | int(0)) ~ '/' ~ (debt_ready_threshold_minutes | int(0)) ~ 'm'] %}
                {% endif %}
                {% if current_run_open | bool %}
                  {% set ns.reasons = ns.reasons + ['previous run still open'] %}
                {% endif %}
                {{ ns.reasons | join('; ') }}
              daily_status_text: >-
                {% if safe_to_mow | bool %}
                  Ready to mow in the current window.
                {% else %}
                  Not mowing: {{ block_reasons if block_reasons | length > 0 else 'waiting for next check' }}.
                {% endif %}
                Plan: {{ compact_schedule }}
                {% if rainy_forecast_summary | length > 0 %}
                  Rainy days forecast: {{ rainy_forecast_summary }}.
                {% endif %}
              maintenance_text: >-
                {% set ns = namespace(items=[]) %}
                {% if cleaning_due | bool %}
                  {% set ns.items = ns.items + ['Clean mower: last cleaning ' ~ (last_cleaning_age_days | float(0)) ~ ' days ago'] %}
                {% endif %}
                {% if blade_change_due | bool %}
                  {% set ns.items = ns.items + ['Change blades: ' ~ (last_blade_change_age_weeks | float(0)) ~ ' weeks / ' ~ (blade_hours_since_change | float(0)) ~ ' cutting hours since reset'] %}
                {% endif %}
                {{ ns.items | join('; ') }}
              previous_notified_schedule: >-
                {% if last_schedule_notification_helper | length > 0 %}
                  {{ states(last_schedule_notification_helper) }}
                {% else %}
                  {{ compact_schedule }}
                {% endif %}
              schedule_changed: >-
                {{ last_schedule_notification_helper | length > 0
                   and compact_schedule != previous_notified_schedule }}
          - choose:
              - conditions: "{{ schedule_changed | bool }}"
                sequence:
                  - choose:
                      - conditions: "{{ persistent_notifications | bool }}"
                        sequence:
                          - action: persistent_notification.create
                            data:
                              title: Smart mowing schedule changed
                              message: "{{ compact_schedule }}"
                              notification_id: smart_mowing_schedule_changed
                  - choose:
                      - conditions: "{{ phone_notify_service | length > 0 }}"
                        sequence:
                          - action: "{{ phone_notify_service }}"
                            data:
                              title: Smart mowing schedule changed
                              message: "{{ compact_schedule }}"
                  - action: input_text.set_value
                    data:
                      entity_id: "{{ last_schedule_notification_helper }}"
                      value: "{{ compact_schedule }}"
          - choose:
              - conditions: "{{ persistent_notifications | bool }}"
                sequence:
                  - action: persistent_notification.create
                    data:
                      title: Smart mowing daily status
                      message: "{{ daily_status_text }}"
                      notification_id: smart_mowing_daily_status
          - choose:
              - conditions: "{{ maintenance_text | length > 0 }}"
                sequence:
                  - choose:
                      - conditions: "{{ persistent_notifications | bool }}"
                        sequence:
                          - action: persistent_notification.create
                            data:
                              title: Smart mowing maintenance
                              message: "{{ maintenance_text }}"
                              notification_id: smart_mowing_maintenance_due
                  - choose:
                      - conditions: "{{ phone_notify_service | length > 0 }}"
                        sequence:
                          - action: "{{ phone_notify_service }}"
                            data:
                              title: Smart mowing maintenance
                              message: "{{ maintenance_text }}"
          - choose:
              - conditions: >-
                  {{ phone_notify_service | length > 0
                     and rainy_forecast_summary | length > 0
                     and last_mow_age_hours | float(0) >= (max_days_without_mowing | float(7) * 24) }}
                sequence:
                  - action: "{{ phone_notify_service }}"
                    data:
                      title: Smart mowing blocked
                      message: >-
                        Rain/wet weather is forecast ({{ rainy_forecast_summary }})
                        and mowing has been missed for
                        {{ (last_mow_age_hours | float(0) / 24) | round(1) }} days.
          - stop: Daily schedule notification checked.

  - choose:
      - conditions: "{{ rain_or_wet_blocker_active | bool }}"
        sequence:
          - action: input_datetime.set_datetime
            target:
              entity_id: !input last_rain_helper
            data:
              datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

  - choose:
      - conditions: "{{ park_when_wet | bool and current_wet | bool and mower_state == 'mowing' }}"
        sequence:
          - action: lawn_mower.dock
            target:
              entity_id: !input mower_entity
          - delay:
              minutes: !input command_response_delay_minutes
          - choose:
              - conditions: "{{ states(mower_entity) == 'mowing' }}"
                sequence:
                  - action: lawn_mower.dock
                    target:
                      entity_id: !input mower_entity
                  - delay:
                      minutes: !input command_response_delay_minutes
                  - condition: template
                    value_template: "{{ states(mower_entity) == 'mowing' }}"
                  - choose:
                      - conditions: "{{ persistent_notifications | bool }}"
                        sequence:
                          - action: persistent_notification.create
                            data:
                              title: Smart mowing alert
                              message: "Dock command was sent because grass/weather is wet, but the mower is still mowing."
                              notification_id: smart_mowing_dock_failed
                  - choose:
                      - conditions: "{{ phone_notify_service | length > 0 }}"
                        sequence:
                          - action: "{{ phone_notify_service }}"
                            data:
                              title: Smart mowing alert
                              message: "Dock command was sent because grass/weather is wet, but the mower is still mowing."

  - choose:
      - conditions: >-
          {{ current_wet | bool
             and last_mow_age_hours | float(0) >= (max_days_without_mowing | float(7) * 24) }}
        sequence:
          - choose:
              - conditions: "{{ persistent_notifications | bool }}"
                sequence:
                  - action: persistent_notification.create
                    data:
                      title: Smart mowing alert
                      message: >-
                        Mowing has been blocked by wet weather/grass for
                        {{ (last_mow_age_hours | float(0) / 24) | round(1) }} days.
                      notification_id: smart_mowing_wet_too_long
          - choose:
              - conditions: "{{ phone_notify_service | length > 0 }}"
                sequence:
                  - action: "{{ phone_notify_service }}"
                    data:
                      title: Smart mowing alert
                      message: >-
                        Mowing has been blocked by wet weather/grass for
                        {{ (last_mow_age_hours | float(0) / 24) | round(1) }} days.

  - condition: template
    value_template: "{{ safe_to_mow | bool }}"

  - variables:
      auto_start_cutting_minutes: "{{ current_cutting_minutes | float(0) }}"

  - action: number.set_value
    target:
      entity_id: !input manual_duration_number
    data:
      value: "{{ calculated_session_hours }}"

  - action: lawn_mower.start_mowing
    target:
      entity_id: !input mower_entity

  - delay:
      minutes: !input command_response_delay_minutes

  - choose:
      - conditions: "{{ states(mower_entity) != 'mowing' }}"
        sequence:
          - choose:
              - conditions: "{{ persistent_notifications | bool }}"
                sequence:
                  - action: persistent_notification.create
                    data:
                      title: Smart mowing alert
                      message: "Start mowing command was sent, but the mower did not start mowing."
                      notification_id: smart_mowing_start_failed
          - choose:
              - conditions: "{{ phone_notify_service | length > 0 }}"
                sequence:
                  - action: "{{ phone_notify_service }}"
                    data:
                      title: Smart mowing alert
                      message: "Start mowing command was sent, but the mower did not start mowing."
          - stop: Start command did not result in mowing.

  - action: input_datetime.set_datetime
    target:
      entity_id: !input current_mow_start_helper
    data:
      datetime: >-
        {{ as_local(states[mower_entity].last_changed).strftime('%Y-%m-%d %H:%M:%S')
           if states[mower_entity] is not none
           else now().strftime('%Y-%m-%d %H:%M:%S') }}

  - choose:
      - conditions: "{{ use_cutting_time_sensor | bool }}"
        sequence:
          - action: input_number.set_value
            data:
              entity_id: "{{ current_mow_cutting_start_helper }}"
              value: "{{ auto_start_cutting_minutes | float(0) }}"
