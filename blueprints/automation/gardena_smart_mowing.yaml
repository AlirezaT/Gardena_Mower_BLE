blueprint:
  name: Smart dry-weather mowing
  description: >-
    Calculate mowing sessions from lawn area and mower capacity, then start a
    Home Assistant lawn mower only when weather and optional wetness blockers say
    the grass should be dry enough. Designed for Gardena Mower BLE, but generic
    enough for any lawn_mower entity with a manual duration number.
  domain: automation
  input:
    mower_entity:
      name: Mower
      description: The lawn_mower entity to start and dock.
      selector:
        entity:
          domain: lawn_mower
    manual_duration_number:
      name: Manual mowing duration number
      description: Number entity that controls manual mowing duration in hours.
      selector:
        entity:
          domain: number
    weather_entity:
      name: Weather entity
      description: Weather entity used for current conditions and hourly forecast.
      selector:
        entity:
          domain: weather
    last_rain_helper:
      name: Last rain helper
      description: Input datetime helper used to remember when rain/wetness was last detected.
      selector:
        entity:
          domain: input_datetime
    last_mow_helper:
      name: Last mow helper
      description: Input datetime helper used to remember when the blueprint last started mowing.
      selector:
        entity:
          domain: input_datetime
    current_mow_start_helper:
      name: Current mowing start helper
      description: Input datetime helper used to remember when the current mowing run started.
      selector:
        entity:
          domain: input_datetime
    total_cutting_time_sensor:
      name: Optional total cutting time sensor
      description: >-
        Optional lifetime cutting/blade-time sensor. When provided, run duration
        and early-stop checks use the cutting-time delta instead of wall-clock
        time, which handles mower sessions split by battery charging.
      default: ""
      selector:
        entity:
          domain: sensor
    current_mow_cutting_start_helper:
      name: Optional cutting time start helper
      description: >-
        Optional input_number helper used to remember the total cutting-time
        value at the start of the current smart mowing run. Use this together
        with the total cutting time sensor.
      default: ""
      selector:
        entity:
          domain: input_number
    next_expected_start_helper:
      name: Optional next expected start helper
      description: >-
        Optional input_datetime helper where the blueprint stores the next
        expected smart mowing start based on rain, drying time, time window, and
        mowing gap.
      default: ""
      selector:
        entity:
          domain: input_datetime
    weekly_schedule_helper:
      name: Optional weekly schedule helper
      description: >-
        Optional input_text helper where the blueprint stores an estimated
        smart mowing plan for the coming week.
      default: ""
      selector:
        entity:
          domain: input_text
    last_schedule_notification_helper:
      name: Optional last schedule notification helper
      description: >-
        Optional input_text helper used to remember the last schedule summary
        that was sent as a notification. Required for changed-only daily
        schedule notifications.
      default: ""
      selector:
        entity:
          domain: input_text
    weekly_run_log_helper:
      name: Weekly run log helper
      description: >-
        Input text helper used to store this week's run report. Create it with a
        high maximum length if you expect many runs.
      selector:
        entity:
          domain: input_text
    wetness_blockers:
      name: Optional wetness blockers
      description: Optional binary sensors or helpers. If any is on, mowing is blocked.
      default: []
      selector:
        entity:
          multiple: true
    lawn_area_m2:
      name: Lawn area
      description: Lawn area in square meters.
      default: 250
      selector:
        number:
          min: 10
          max: 5000
          step: 10
          unit_of_measurement: m2
          mode: box
    mower_capacity_m2_per_hour:
      name: Mower capacity
      description: Effective square meters the mower can handle per mowing hour.
      default: 60
      selector:
        number:
          min: 5
          max: 500
          step: 5
          unit_of_measurement: m2/h
          mode: box
    weekly_coverage_multiplier:
      name: Weekly coverage multiplier
      description: >-
        How many times the total lawn area should be covered per week. Use 1.0
        as a baseline and increase for faster growing seasons.
      default: 1.0
      selector:
        number:
          min: 0.25
          max: 5
          step: 0.05
          mode: box
    min_sessions_per_week:
      name: Minimum sessions per week
      default: 2
      selector:
        number:
          min: 1
          max: 14
          step: 1
          mode: box
    max_sessions_per_week:
      name: Maximum sessions per week
      default: 7
      selector:
        number:
          min: 1
          max: 21
          step: 1
          mode: box
    min_session_minutes:
      name: Minimum session length
      default: 30
      selector:
        number:
          min: 10
          max: 240
          step: 5
          unit_of_measurement: min
          mode: box
    max_session_minutes:
      name: Maximum session length
      default: 180
      selector:
        number:
          min: 30
          max: 720
          step: 15
          unit_of_measurement: min
          mode: box
    minimum_gap_override_hours:
      name: Minimum gap override
      description: Set to 0 to use the calculated spacing from sessions per week.
      default: 0
      selector:
        number:
          min: 0
          max: 168
          step: 1
          unit_of_measurement: h
          mode: box
    allowed_start_time:
      name: Earliest mowing start
      default: "09:00:00"
      selector:
        time:
    allowed_end_time:
      name: Latest mowing start
      default: "18:00:00"
      selector:
        time:
    check_minutes_pattern:
      name: Check interval
      description: "Time pattern minutes field. Examples: /15, /30, 0."
      default: "/30"
      selector:
        select:
          options:
            - "/15"
            - "/30"
            - "0"
    forecast_lookahead_hours:
      name: Rain forecast lookahead
      description: Do not start if meaningful rain is forecast within this many hours.
      default: 3
      selector:
        number:
          min: 1
          max: 24
          step: 1
          unit_of_measurement: h
          mode: box
    precipitation_threshold_mm:
      name: Rain amount threshold
      description: Forecast precipitation amount that blocks mowing.
      default: 0.2
      selector:
        number:
          min: 0
          max: 10
          step: 0.1
          unit_of_measurement: mm
          mode: box
    precipitation_probability_threshold:
      name: Rain probability threshold
      description: Forecast precipitation probability that blocks mowing.
      default: 50
      selector:
        number:
          min: 0
          max: 100
          step: 5
          unit_of_measurement: "%"
          mode: slider
    base_dry_hours_after_rain:
      name: Base drying time after rain
      default: 4
      selector:
        number:
          min: 0
          max: 48
          step: 0.5
          unit_of_measurement: h
          mode: box
    humidity_block_threshold:
      name: Humidity block threshold
      description: Block mowing above this outdoor humidity value.
      default: 92
      selector:
        number:
          min: 50
          max: 100
          step: 1
          unit_of_measurement: "%"
          mode: slider
    low_temperature_threshold:
      name: Low temperature threshold
      description: Add extra drying time below this temperature.
      default: 10
      selector:
        number:
          min: -10
          max: 25
          step: 1
          unit_of_measurement: C
          mode: box
    extra_dry_hours_when_cold_or_humid:
      name: Extra drying time when cold or humid
      default: 2
      selector:
        number:
          min: 0
          max: 24
          step: 0.5
          unit_of_measurement: h
          mode: box
    park_when_wet:
      name: Dock mower when rain/wetness is detected
      default: true
      selector:
        boolean:
    persistent_notifications:
      name: Use persistent notifications
      default: true
      selector:
        boolean:
    phone_notify_service:
      name: Optional phone notify service
      description: >-
        Optional notify service such as notify.mobile_app_phone_name. Leave blank
        to only use persistent notifications.
      default: ""
      selector:
        text:
    command_response_delay_minutes:
      name: Command response check delay
      description: Minutes to wait before checking if start or dock commands took effect.
      default: 5
      selector:
        number:
          min: 1
          max: 30
          step: 1
          unit_of_measurement: min
          mode: box
    max_days_without_mowing:
      name: Alert after this many days without mowing
      description: Alert if wet weather has blocked mowing for too long.
      default: 7
      selector:
        number:
          min: 1
          max: 30
          step: 1
          unit_of_measurement: d
          mode: box
    early_stop_threshold_percent:
      name: Early stop threshold
      description: Alert if a mowing run ends before this percentage of planned duration.
      default: 60
      selector:
        number:
          min: 10
          max: 95
          step: 5
          unit_of_measurement: "%"
          mode: slider
    weekly_report_day:
      name: Weekly report day
      default: Sunday
      selector:
        select:
          options:
            - Monday
            - Tuesday
            - Wednesday
            - Thursday
            - Friday
            - Saturday
            - Sunday
    weekly_report_time:
      name: Weekly report time
      default: "18:00:00"
      selector:
        time:
    daily_schedule_notification_time:
      name: Daily schedule notification time
      description: >-
        Time to check whether the estimated smart mowing schedule changed and
        send a notification if it did. Configure the last schedule notification
        helper to enable changed-only behavior.
      default: "08:00:00"
      selector:
        time:

mode: queued
max_exceeded: silent

trigger:
  - platform: time_pattern
    id: schedule_check
    minutes: !input check_minutes_pattern
  - platform: state
    id: mowing_started
    entity_id: !input mower_entity
    to: mowing
  - platform: state
    id: mowing_finished
    entity_id: !input mower_entity
    from: mowing
  - platform: state
    id: mower_unavailable
    entity_id: !input mower_entity
    to:
      - unavailable
      - unknown
    for:
      minutes: 5
  - platform: time
    id: weekly_report
    at: !input weekly_report_time
  - platform: time
    id: daily_schedule_report
    at: !input daily_schedule_notification_time

variables:
  mower_entity: !input mower_entity
  manual_duration_number: !input manual_duration_number
  weather_entity: !input weather_entity
  last_rain_helper: !input last_rain_helper
  last_mow_helper: !input last_mow_helper
  current_mow_start_helper: !input current_mow_start_helper
  total_cutting_time_sensor: !input total_cutting_time_sensor
  current_mow_cutting_start_helper: !input current_mow_cutting_start_helper
  next_expected_start_helper: !input next_expected_start_helper
  weekly_schedule_helper: !input weekly_schedule_helper
  last_schedule_notification_helper: !input last_schedule_notification_helper
  weekly_run_log_helper: !input weekly_run_log_helper
  wetness_blockers: !input wetness_blockers
  lawn_area_m2: !input lawn_area_m2
  mower_capacity_m2_per_hour: !input mower_capacity_m2_per_hour
  weekly_coverage_multiplier: !input weekly_coverage_multiplier
  min_sessions_per_week: !input min_sessions_per_week
  max_sessions_per_week: !input max_sessions_per_week
  min_session_minutes: !input min_session_minutes
  max_session_minutes: !input max_session_minutes
  minimum_gap_override_hours: !input minimum_gap_override_hours
  allowed_start_time: !input allowed_start_time
  allowed_end_time: !input allowed_end_time
  forecast_lookahead_hours: !input forecast_lookahead_hours
  precipitation_threshold_mm: !input precipitation_threshold_mm
  precipitation_probability_threshold: !input precipitation_probability_threshold
  base_dry_hours_after_rain: !input base_dry_hours_after_rain
  humidity_block_threshold: !input humidity_block_threshold
  low_temperature_threshold: !input low_temperature_threshold
  extra_dry_hours_when_cold_or_humid: !input extra_dry_hours_when_cold_or_humid
  park_when_wet: !input park_when_wet
  persistent_notifications: !input persistent_notifications
  phone_notify_service: !input phone_notify_service
  command_response_delay_minutes: !input command_response_delay_minutes
  max_days_without_mowing: !input max_days_without_mowing
  early_stop_threshold_percent: !input early_stop_threshold_percent
  weekly_report_day: !input weekly_report_day
  rain_conditions:
    - rainy
    - pouring
    - lightning-rainy
    - snowy-rainy
    - hail
    - snowy
  mower_state: "{{ states(mower_entity) }}"
  weather_condition: "{{ states(weather_entity) }}"
  outdoor_humidity: "{{ state_attr(weather_entity, 'humidity') | float(0) }}"
  outdoor_temperature: "{{ state_attr(weather_entity, 'temperature') | float(99) }}"
  blocker_active: >-
    {% set entities = wetness_blockers if wetness_blockers is iterable and wetness_blockers is not string else [wetness_blockers] %}
    {% set ns = namespace(active=false) %}
    {% for entity in entities %}
      {% if entity and states(entity) in ['on', 'wet', 'true', 'rainy'] %}
        {% set ns.active = true %}
      {% endif %}
    {% endfor %}
    {{ ns.active }}
  current_wet: >-
    {{ weather_condition in rain_conditions
       or blocker_active | bool
       or outdoor_humidity | float(0) >= humidity_block_threshold | float(92) }}
  last_rain_age_hours: >-
    {% set ts = as_timestamp(states(last_rain_helper), none) %}
    {% if ts is none %}
      9999
    {% else %}
      {{ ((as_timestamp(now()) - ts) / 3600) | float(0) }}
    {% endif %}
  last_mow_age_hours: >-
    {% set ts = as_timestamp(states(last_mow_helper), none) %}
    {% if ts is none %}
      9999
    {% else %}
      {{ ((as_timestamp(now()) - ts) / 3600) | float(0) }}
    {% endif %}
  dynamic_dry_hours: >-
    {% set extra = extra_dry_hours_when_cold_or_humid | float(0) %}
    {% set hours = base_dry_hours_after_rain | float(0) %}
    {% if outdoor_humidity | float(0) >= 85 %}
      {% set hours = hours + extra %}
    {% endif %}
    {% if outdoor_temperature | float(99) <= low_temperature_threshold | float(10) %}
      {% set hours = hours + extra %}
    {% endif %}
    {{ hours }}
  weekly_minutes_needed: >-
    {% set capacity = mower_capacity_m2_per_hour | float(1) %}
    {% if capacity <= 0 %}
      0
    {% else %}
      {{ ((lawn_area_m2 | float(0)) / capacity * (weekly_coverage_multiplier | float(1)) * 60) | round(0, 'ceil') }}
    {% endif %}
  calculated_sessions_per_week: >-
    {% set weekly = weekly_minutes_needed | float(0) %}
    {% set max_minutes = max_session_minutes | float(180) %}
    {% set raw_sessions = ((weekly / max_minutes) | round(0, 'ceil')) | int %}
    {% set raw_sessions = [raw_sessions, min_sessions_per_week | int(1)] | max %}
    {{ [raw_sessions, max_sessions_per_week | int(7)] | min }}
  calculated_session_minutes: >-
    {% set sessions = calculated_sessions_per_week | int(1) %}
    {% set raw_minutes = ((weekly_minutes_needed | float(0)) / sessions) | round(0, 'ceil') %}
    {% set raw_minutes = [raw_minutes, min_session_minutes | float(30)] | max %}
    {{ [raw_minutes, max_session_minutes | float(180)] | min }}
  calculated_session_hours: >-
    {{ (((calculated_session_minutes | float(30)) / 60 * 2) | round(0, 'ceil') / 2) | float }}
  calculated_gap_hours: >-
    {% if minimum_gap_override_hours | float(0) > 0 %}
      {{ minimum_gap_override_hours | float(0) }}
    {% else %}
      {{ (168 / (calculated_sessions_per_week | int(1))) | round(1) }}
    {% endif %}
  within_allowed_time: >-
    {% set start = today_at(allowed_start_time) %}
    {% set end = today_at(allowed_end_time) %}
    {% if start <= end %}
      {{ start <= now() <= end }}
    {% else %}
      {{ now() >= start or now() <= end }}
    {% endif %}
  use_cutting_time_sensor: >-
    {{ total_cutting_time_sensor | length > 0
       and current_mow_cutting_start_helper | length > 0
       and states(total_cutting_time_sensor) not in ['unknown', 'unavailable', 'none', '']
       and states(current_mow_cutting_start_helper) not in ['unknown', 'unavailable', 'none', ''] }}
  current_cutting_minutes: >-
    {% set value = states(total_cutting_time_sensor) | float(0) %}
    {% set unit = state_attr(total_cutting_time_sensor, 'unit_of_measurement') | default('', true) %}
    {% if unit in ['s', 'sec', 'second', 'seconds'] %}
      {{ value / 60 }}
    {% elif unit in ['h', 'hr', 'hour', 'hours'] %}
      {{ value * 60 }}
    {% elif unit in ['d', 'day', 'days'] %}
      {{ value * 1440 }}
    {% else %}
      {{ value }}
    {% endif %}
  stored_cutting_start_minutes: "{{ states(current_mow_cutting_start_helper) | float(0) }}"
  active_cutting_minutes: >-
    {{ [current_cutting_minutes | float(0) - stored_cutting_start_minutes | float(0), 0] | max }}

action:
  - choose:
      - conditions: "{{ trigger.id == 'mower_unavailable' }}"
        sequence:
          - choose:
              - conditions: "{{ persistent_notifications | bool }}"
                sequence:
                  - action: persistent_notification.create
                    data:
                      title: Smart mowing alert
                      message: "Mower is unavailable or not responding: {{ mower_entity }}"
                      notification_id: smart_mowing_mower_unavailable
          - choose:
              - conditions: "{{ phone_notify_service | length > 0 }}"
                sequence:
                  - action: "{{ phone_notify_service }}"
                    data:
                      title: Smart mowing alert
                      message: "Mower is unavailable or not responding: {{ mower_entity }}"
          - stop: Mower unavailable alert sent.

      - conditions: "{{ trigger.id == 'mowing_started' }}"
        sequence:
          - variables:
              planned_minutes: "{{ (states(manual_duration_number) | float(calculated_session_hours | float(0)) * 60) | round(0) }}"
              cutting_start_should_reset: >-
                {{ not use_cutting_time_sensor | bool
                   or stored_cutting_start_minutes | float(0) <= 0
                   or active_cutting_minutes | float(0) >= planned_minutes | float(0) * (early_stop_threshold_percent | float(60) / 100) }}
          - choose:
              - conditions: "{{ cutting_start_should_reset | bool }}"
                sequence:
                  - action: input_datetime.set_datetime
                    target:
                      entity_id: !input current_mow_start_helper
                    data:
                      datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
                  - choose:
                      - conditions: "{{ use_cutting_time_sensor | bool }}"
                        sequence:
                          - action: input_number.set_value
                            data:
                              entity_id: "{{ current_mow_cutting_start_helper }}"
                              value: "{{ current_cutting_minutes | float(0) }}"
          - stop: Mowing start recorded.

      - conditions: "{{ trigger.id == 'mowing_finished' }}"
        sequence:
          - variables:
              started_ts: "{{ as_timestamp(states(current_mow_start_helper), none) }}"
              ended_ts: "{{ as_timestamp(now()) }}"
              wall_duration_minutes: >-
                {% if started_ts is none %}
                  0
                {% else %}
                  {{ ((ended_ts - started_ts) / 60) | round(0) }}
                {% endif %}
              planned_minutes: "{{ (states(manual_duration_number) | float(calculated_session_hours | float(0)) * 60) | round(0) }}"
              cutting_duration_minutes: "{{ active_cutting_minutes | float(0) | round(0) }}"
              duration_minutes: >-
                {% if use_cutting_time_sensor | bool %}
                  {{ cutting_duration_minutes }}
                {% else %}
                  {{ wall_duration_minutes }}
                {% endif %}
              likely_recharge_pause: >-
                {{ use_cutting_time_sensor | bool
                   and duration_minutes | float(0) > 0
                   and planned_minutes | float(0) > 0
                   and duration_minutes | float(0) < planned_minutes | float(0) * (early_stop_threshold_percent | float(60) / 100) }}
              too_short: >-
                {{ not use_cutting_time_sensor | bool
                   and duration_minutes | float(0) > 0
                   and planned_minutes | float(0) > 0
                   and duration_minutes | float(0) < planned_minutes | float(0) * (early_stop_threshold_percent | float(60) / 100) }}
              run_line: >-
                {{ now().strftime('%a %Y-%m-%d') }}:
                {{ started_ts | timestamp_custom('%H:%M', true) if started_ts is not none else 'unknown' }}
                - {{ now().strftime('%H:%M') }}
                ({{ duration_minutes | int(0) }} min{% if use_cutting_time_sensor | bool %} cutting{% endif %})
              existing_log: "{{ states(weekly_run_log_helper) }}"
              new_log: >-
                {% set existing = '' if existing_log in ['unknown', 'unavailable', 'none'] else existing_log %}
                {{ (existing ~ '\n' ~ run_line).strip() }}
          - choose:
              - conditions: "{{ likely_recharge_pause | bool }}"
                sequence:
                  - stop: Mower paused or docked before enough cutting time was reached; treating this as a recharge/interruption, not a completed run.
          - action: input_text.set_value
            data:
              entity_id: "{{ weekly_run_log_helper }}"
              value: "{{ new_log[-1000:] }}"
          - action: input_datetime.set_datetime
            target:
              entity_id: !input last_mow_helper
            data:
              datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
          - choose:
              - conditions: "{{ use_cutting_time_sensor | bool }}"
                sequence:
                  - action: input_number.set_value
                    data:
                      entity_id: "{{ current_mow_cutting_start_helper }}"
                      value: 0
          - choose:
              - conditions: "{{ too_short | bool }}"
                sequence:
                  - choose:
                      - conditions: "{{ persistent_notifications | bool }}"
                        sequence:
                          - action: persistent_notification.create
                            data:
                              title: Smart mowing alert
                              message: >-
                                Mowing ended early. Planned about {{ planned_minutes | int(0) }}
                                min, but ran {{ duration_minutes | int(0) }} min.
                              notification_id: smart_mowing_ended_early
                  - choose:
                      - conditions: "{{ phone_notify_service | length > 0 }}"
                        sequence:
                          - action: "{{ phone_notify_service }}"
                            data:
                              title: Smart mowing alert
                              message: >-
                                Mowing ended early. Planned about {{ planned_minutes | int(0) }}
                                min, but ran {{ duration_minutes | int(0) }} min.
          - stop: Mowing finish recorded.

      - conditions: "{{ trigger.id == 'weekly_report' }}"
        sequence:
          - condition: template
            value_template: "{{ now().strftime('%A') == weekly_report_day }}"
          - variables:
              report_text: >-
                {% set log = states(weekly_run_log_helper) %}
                {% if log in ['unknown', 'unavailable', 'none', ''] %}
                  No mowing runs were recorded this week.
                {% else %}
                  {{ log }}
                {% endif %}
          - choose:
              - conditions: "{{ persistent_notifications | bool }}"
                sequence:
                  - action: persistent_notification.create
                    data:
                      title: Smart mowing weekly report
                      message: "{{ report_text }}"
                      notification_id: smart_mowing_weekly_report
          - choose:
              - conditions: "{{ phone_notify_service | length > 0 }}"
                sequence:
                  - action: "{{ phone_notify_service }}"
                    data:
                      title: Smart mowing weekly report
                      message: "{{ report_text }}"
          - action: input_text.set_value
            data:
              entity_id: "{{ weekly_run_log_helper }}"
              value: ""
          - stop: Weekly report sent.

  - action: weather.get_forecasts
    target:
      entity_id: !input weather_entity
    data:
      type: hourly
    response_variable: weather_forecast

  - variables:
      hourly_forecast: "{{ weather_forecast[weather_entity]['forecast'] if weather_entity in weather_forecast else [] }}"
      rain_forecast_soon: >-
        {% set ns = namespace(rain=false) %}
        {% for item in hourly_forecast[: forecast_lookahead_hours | int(3)] %}
          {% set condition = item.condition | default('') %}
          {% set precipitation = item.precipitation | default(0) | float(0) %}
          {% set probability = item.precipitation_probability | default(0) | float(0) %}
          {% if condition in rain_conditions
                or precipitation >= precipitation_threshold_mm | float(0.2)
                or probability >= precipitation_probability_threshold | float(50) %}
            {% set ns.rain = true %}
          {% endif %}
        {% endfor %}
        {{ ns.rain }}
      safe_to_mow: >-
        {{ within_allowed_time | bool
           and not current_wet | bool
           and not rain_forecast_soon | bool
           and last_rain_age_hours | float(9999) >= dynamic_dry_hours | float(4)
           and last_mow_age_hours | float(9999) >= calculated_gap_hours | float(24)
           and mower_state not in ['mowing', 'returning', 'error', 'unavailable', 'unknown'] }}
      next_expected_start: >-
        {% set now_ts = as_timestamp(now()) %}
        {% set allowed_start_ts = as_timestamp(today_at(allowed_start_time)) %}
        {% set allowed_end_ts = as_timestamp(today_at(allowed_end_time)) %}
        {% if allowed_start_ts <= allowed_end_ts %}
          {% if now_ts <= allowed_start_ts %}
            {% set window_ts = allowed_start_ts %}
          {% elif now_ts <= allowed_end_ts %}
            {% set window_ts = now_ts %}
          {% else %}
            {% set window_ts = allowed_start_ts + 86400 %}
          {% endif %}
        {% else %}
          {% set window_ts = now_ts if now_ts >= allowed_start_ts or now_ts <= allowed_end_ts else allowed_start_ts %}
        {% endif %}
        {% set rain_ts = as_timestamp(states(last_rain_helper), none) %}
        {% set dry_ts = 0 if rain_ts is none else rain_ts + (dynamic_dry_hours | float(4) * 3600) %}
        {% set mow_ts = as_timestamp(states(last_mow_helper), none) %}
        {% set gap_ts = 0 if mow_ts is none else mow_ts + (calculated_gap_hours | float(24) * 3600) %}
        {% set forecast_ts = now_ts + (forecast_lookahead_hours | int(3) * 3600) if rain_forecast_soon | bool else 0 %}
        {% set wet_ts = now_ts + (dynamic_dry_hours | float(4) * 3600) if current_wet | bool else 0 %}
        {{ [window_ts, dry_ts, gap_ts, forecast_ts, wet_ts] | max | timestamp_custom('%Y-%m-%d %H:%M:%S', true) }}
      estimated_weekly_schedule: >-
        {% set start_ts = as_timestamp(next_expected_start, none) %}
        {% set sessions = calculated_sessions_per_week | int(1) %}
        {% set gap = calculated_gap_hours | float(24) * 3600 %}
        {% set duration = calculated_session_minutes | int(0) %}
        {% if start_ts is none %}
          No schedule estimate
        {% else %}
          {% set shown = [sessions, 6] | min %}
          {% set ns = namespace(times=[]) %}
          {% for index in range(shown) %}
            {% set ts = start_ts + (index * gap) %}
            {% set ns.times = ns.times + [ts | timestamp_custom('%a %H:%M', true)] %}
          {% endfor %}
          Next {{ start_ts | timestamp_custom('%a %H:%M', true) }};
          {{ sessions }}x/week, {{ duration }}m each;
          {{ ns.times | join(', ') }}{% if sessions > shown %}, +{{ sessions - shown }} more{% endif %}
        {% endif %}

  - choose:
      - conditions: "{{ next_expected_start_helper | length > 0 }}"
        sequence:
          - action: input_datetime.set_datetime
            data:
              entity_id: "{{ next_expected_start_helper }}"
              datetime: "{{ next_expected_start }}"

  - choose:
      - conditions: "{{ weekly_schedule_helper | length > 0 }}"
        sequence:
          - action: input_text.set_value
            data:
              entity_id: "{{ weekly_schedule_helper }}"
              value: "{{ estimated_weekly_schedule[:255] }}"

  - choose:
      - conditions: "{{ trigger.id == 'daily_schedule_report' }}"
        sequence:
          - variables:
              compact_schedule: "{{ estimated_weekly_schedule[:255] }}"
              previous_notified_schedule: >-
                {% if last_schedule_notification_helper | length > 0 %}
                  {{ states(last_schedule_notification_helper) }}
                {% else %}
                  {{ compact_schedule }}
                {% endif %}
              schedule_changed: >-
                {{ last_schedule_notification_helper | length > 0
                   and compact_schedule != previous_notified_schedule }}
          - choose:
              - conditions: "{{ schedule_changed | bool }}"
                sequence:
                  - choose:
                      - conditions: "{{ persistent_notifications | bool }}"
                        sequence:
                          - action: persistent_notification.create
                            data:
                              title: Smart mowing schedule changed
                              message: "{{ compact_schedule }}"
                              notification_id: smart_mowing_schedule_changed
                  - choose:
                      - conditions: "{{ phone_notify_service | length > 0 }}"
                        sequence:
                          - action: "{{ phone_notify_service }}"
                            data:
                              title: Smart mowing schedule changed
                              message: "{{ compact_schedule }}"
                  - action: input_text.set_value
                    data:
                      entity_id: "{{ last_schedule_notification_helper }}"
                      value: "{{ compact_schedule }}"
          - stop: Daily schedule notification checked.

  - choose:
      - conditions: "{{ current_wet | bool }}"
        sequence:
          - action: input_datetime.set_datetime
            target:
              entity_id: !input last_rain_helper
            data:
              datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

  - choose:
      - conditions: "{{ park_when_wet | bool and current_wet | bool and mower_state == 'mowing' }}"
        sequence:
          - action: lawn_mower.dock
            target:
              entity_id: !input mower_entity
          - delay:
              minutes: !input command_response_delay_minutes
          - choose:
              - conditions: "{{ states(mower_entity) == 'mowing' }}"
                sequence:
                  - action: lawn_mower.dock
                    target:
                      entity_id: !input mower_entity
                  - delay:
                      minutes: !input command_response_delay_minutes
                  - condition: template
                    value_template: "{{ states(mower_entity) == 'mowing' }}"
                  - choose:
                      - conditions: "{{ persistent_notifications | bool }}"
                        sequence:
                          - action: persistent_notification.create
                            data:
                              title: Smart mowing alert
                              message: "Dock command was sent because grass/weather is wet, but the mower is still mowing."
                              notification_id: smart_mowing_dock_failed
                  - choose:
                      - conditions: "{{ phone_notify_service | length > 0 }}"
                        sequence:
                          - action: "{{ phone_notify_service }}"
                            data:
                              title: Smart mowing alert
                              message: "Dock command was sent because grass/weather is wet, but the mower is still mowing."

  - choose:
      - conditions: >-
          {{ current_wet | bool
             and last_mow_age_hours | float(0) >= (max_days_without_mowing | float(7) * 24) }}
        sequence:
          - choose:
              - conditions: "{{ persistent_notifications | bool }}"
                sequence:
                  - action: persistent_notification.create
                    data:
                      title: Smart mowing alert
                      message: >-
                        Mowing has been blocked by wet weather/grass for
                        {{ (last_mow_age_hours | float(0) / 24) | round(1) }} days.
                      notification_id: smart_mowing_wet_too_long
          - choose:
              - conditions: "{{ phone_notify_service | length > 0 }}"
                sequence:
                  - action: "{{ phone_notify_service }}"
                    data:
                      title: Smart mowing alert
                      message: >-
                        Mowing has been blocked by wet weather/grass for
                        {{ (last_mow_age_hours | float(0) / 24) | round(1) }} days.

  - condition: template
    value_template: "{{ safe_to_mow | bool }}"

  - action: number.set_value
    target:
      entity_id: !input manual_duration_number
    data:
      value: "{{ calculated_session_hours }}"

  - action: lawn_mower.start_mowing
    target:
      entity_id: !input mower_entity

  - delay:
      minutes: !input command_response_delay_minutes

  - choose:
      - conditions: "{{ states(mower_entity) != 'mowing' }}"
        sequence:
          - choose:
              - conditions: "{{ persistent_notifications | bool }}"
                sequence:
                  - action: persistent_notification.create
                    data:
                      title: Smart mowing alert
                      message: "Start mowing command was sent, but the mower did not start mowing."
                      notification_id: smart_mowing_start_failed
          - choose:
              - conditions: "{{ phone_notify_service | length > 0 }}"
                sequence:
                  - action: "{{ phone_notify_service }}"
                    data:
                      title: Smart mowing alert
                      message: "Start mowing command was sent, but the mower did not start mowing."

  - action: input_datetime.set_datetime
    target:
      entity_id: !input last_mow_helper
    data:
      datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
